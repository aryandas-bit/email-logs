name: Daily Ticket Report

on:
  schedule:
    - cron: '30 1 * * *'  # 01:30 UTC = 07:00 IST daily
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date as YYYY-MM-DD (leave blank for yesterday in IST)'
        required: false
        default: ''

jobs:
  post-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post daily report to Slack
        env:
          DAILY_REPORT_SLACK_WEBHOOK_URL: ${{ secrets.DAILY_REPORT_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python3 scripts/daily_report.py --date "${{ github.event.inputs.date }}"
          else
            python3 scripts/daily_report.py
          fi
