<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Email Log Sheet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .container { max-width: 620px; margin: 0 auto; }

  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .conn-line { font-size: 13px; color: #888; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
  .conn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .conn-dot.live { background: #2e7d32; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn-export {
    padding: 9px 18px; border-radius: 8px; border: none;
    background: #ccc; color: #fff; font-size: 13px; font-weight: 600;
    cursor: not-allowed;
  }
  .btn-export.active { background: #2e7d32; cursor: pointer; }
  .btn-export.active:hover { background: #1b5e20; }

  /* Summary */
  .summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .card { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); flex: 1; min-width: 100px; }
  .card .label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .card .value { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-top: 4px; line-height: 1; }
  .card .value.green { color: #2e7d32; }
  .card .value.orange { color: #e65100; }
  .card .value.blue { color: #1565c0; }

  /* Leaderboard */
  .leaderboard { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden; }

  .lb-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; border-bottom: 1px solid #f5f5f5;
    cursor: pointer; transition: background 0.15s;
    user-select: none;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: #fafbfc; }

  .lb-rank { width: 28px; font-size: 15px; font-weight: 700; color: #ccc; text-align: center; flex-shrink: 0; }
  .lb-rank.top { color: #f5a623; }

  .lb-avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; font-size: 13px;
  }

  .lb-info { flex: 1; min-width: 0; }
  .lb-name { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .lb-email { font-size: 12px; color: #aaa; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .lb-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .lb-count { font-size: 22px; font-weight: 700; color: #1a1a2e; min-width: 28px; text-align: right; }
  .lb-sub { font-size: 11px; color: #bbb; text-align: right; line-height: 1.4; }
  .lb-sub span { display: block; }
  .lb-sub .res { color: #2e7d32; }
  .lb-sub .hld { color: #e65100; }

  .lb-chevron { color: #ccc; font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
  .lb-chevron.open { transform: rotate(180deg); }

  /* Bar */
  .lb-bar-wrap { height: 3px; background: #f0f0f0; margin: 0 20px; }
  .lb-bar { height: 3px; border-radius: 2px; transition: width 0.4s ease; }

  /* Detail panel */
  .lb-detail { display: none; border-top: 1px solid #f0f0f0; }
  .lb-detail.open { display: block; }
  .tbl-header { display: grid; grid-template-columns: 40px 1fr 1.4fr 1fr; padding: 8px 20px; background: #f9fafb; font-size: 11px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; }
  .tbl-row { display: grid; grid-template-columns: 40px 1fr 1.4fr 1fr; padding: 10px 20px; border-top: 1px solid #f8f8f8; font-size: 13px; align-items: center; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { background: #f0fff4; } to { background: transparent; } }
  .tbl-row:hover { background: #fafbfc; }
  .row-num { color: #ccc; font-size: 12px; font-weight: 600; }
  .row-ticket { font-family: monospace; font-weight: 600; color: #1a1a2e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-time { color: #bbb; font-size: 12px; }
  .status-pill { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .status-resolved { background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; }
  .status-onhold   { background: #fff3e0; color: #e65100; border: 1.5px solid #ffcc80; }

  .empty-overall { text-align: center; padding: 60px 20px; background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); color: #ccc; }
  .empty-overall p { margin-top: 8px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>Team Email Log Sheet</h1>
      <div class="conn-line">
        <span class="conn-dot" id="connDot"></span>
        <span id="connStatus">Connecting…</span>
      </div>
    </div>
    <button class="btn-export" id="exportBtn" onclick="extractCSV()">⬇ Export CSV</button>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="card"><div class="label">Agents</div><div class="value blue" id="cAgents">0</div></div>
    <div class="card"><div class="label">Total</div><div class="value" id="cTotal">0</div></div>
    <div class="card"><div class="label">Resolved</div><div class="value green" id="cResolved">0</div></div>
    <div class="card"><div class="label">On Hold</div><div class="value orange" id="cOnHold">0</div></div>
  </div>

  <div id="board">
    <div class="empty-overall">
      <strong style="font-size:18px;color:#ddd">No entries yet</strong>
      <p>Entries appear here instantly as agents log tickets on Yellow.ai</p>
    </div>
  </div>

</div>
<script>
const FIREBASE_URL = 'https://yl-logs-default-rtdb.firebaseio.com';

let allData = {};

const COLORS = ['#5c6bc0','#26a69a','#ef5350','#ab47bc','#42a5f5','#66bb6a','#ffa726','#ec407a'];
function avatarColor(key) { let h = 0; for (const c of key) h = (h * 31 + c.charCodeAt(0)) & 0xffffff; return COLORS[Math.abs(h) % COLORS.length]; }
function initials(email) { const n = (email||'?').split('@')[0].split(/[._\-]/); return n.length >= 2 ? (n[0][0]+n[1][0]).toUpperCase() : (email||'?').slice(0,2).toUpperCase(); }
function displayName(email) { return (email||'unknown').split('@')[0].split(/[._]/).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' '); }

function renderAll(data) {
  allData = data || {};
  const board = document.getElementById('board');
  const agentKeys = Object.keys(allData);

  if (agentKeys.length === 0) {
    board.innerHTML = `<div class="empty-overall"><strong style="font-size:18px;color:#ddd">No entries yet</strong><p>Entries appear here instantly as agents log tickets on Yellow.ai</p></div>`;
    document.getElementById('summary').style.display = 'none';
    document.getElementById('exportBtn').classList.remove('active');
    return;
  }

  document.getElementById('summary').style.display = 'flex';
  document.getElementById('exportBtn').classList.add('active');

  // Preserve open detail panels
  const openPanels = new Set();
  board.querySelectorAll('.lb-detail.open').forEach(el => openPanels.add(el.dataset.key));

  // Build agent list sorted by ticket count desc
  const agents = agentKeys.map(key => {
    const entries = Object.values(allData[key]).sort((a, b) => b.id - a.id);
    const email    = entries[0]?.agentEmail || key;
    const resolved = entries.filter(e => e.status === 'Resolved').length;
    const onhold   = entries.filter(e => e.status === 'On Hold').length;
    return { key, email, entries, resolved, onhold, total: entries.length };
  }).sort((a, b) => b.total - a.total);

  const maxCount = agents[0]?.total || 1;
  let totalTickets = 0, totalResolved = 0, totalOnHold = 0;
  agents.forEach(a => { totalTickets += a.total; totalResolved += a.resolved; totalOnHold += a.onhold; });

  const rows = agents.map((a, i) => {
    const isOpen = openPanels.has(a.key);
    const barPct = Math.round((a.total / maxCount) * 100);
    const color  = avatarColor(a.key);

    return `
      <div>
        <div class="lb-row" onclick="toggle('${a.key}')">
          <div class="lb-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
          <div class="lb-avatar" style="background:${color}">${initials(a.email)}</div>
          <div class="lb-info">
            <div class="lb-name">${displayName(a.email)}</div>
            <div class="lb-email">${a.email}</div>
          </div>
          <div class="lb-right">
            <div>
              <div class="lb-count">${a.total}</div>
              <div class="lb-sub">
                <span class="res">${a.resolved} resolved</span>
                <span class="hld">${a.onhold} on hold</span>
              </div>
            </div>
            <span class="lb-chevron ${isOpen ? 'open' : ''}" id="chev-${a.key}">▼</span>
          </div>
        </div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barPct}%;background:${color}"></div></div>
        <div class="lb-detail ${isOpen ? 'open' : ''}" id="det-${a.key}" data-key="${a.key}">
          <div class="tbl-header"><span>#</span><span>Ticket</span><span>Timestamp</span><span>Status</span></div>
          ${a.entries.map((e, j) => `
            <div class="tbl-row">
              <span class="row-num">${j + 1}</span>
              <span class="row-ticket" title="${e.ticketId}">${e.ticketId}</span>
              <span class="row-time">${e.timestamp}</span>
              <span class="status-pill ${e.status === 'Resolved' ? 'status-resolved' : 'status-onhold'}">${e.status}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');

  board.innerHTML = `<div class="leaderboard">${rows}</div>`;
  document.getElementById('cAgents').textContent   = agents.length;
  document.getElementById('cTotal').textContent    = totalTickets;
  document.getElementById('cResolved').textContent = totalResolved;
  document.getElementById('cOnHold').textContent   = totalOnHold;
}

function toggle(key) {
  const det  = document.getElementById('det-'  + key);
  const chev = document.getElementById('chev-' + key);
  det.classList.toggle('open');
  chev.classList.toggle('open');
}

// ── Real-time Firebase SSE ──
function connect() {
  const src = new EventSource(FIREBASE_URL + '/entries.json');

  src.addEventListener('put', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      renderAll(msg.data);
    } else {
      const parts = msg.path.replace(/^\//, '').split('/');
      if (parts.length === 2) {
        const [agentKey, entryId] = parts;
        if (!allData[agentKey]) allData[agentKey] = {};
        allData[agentKey][entryId] = msg.data;
        renderAll(allData);
      }
    }
    document.getElementById('connDot').className = 'conn-dot live';
    document.getElementById('connStatus').textContent = 'Live';
  });

  src.addEventListener('patch', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.data && typeof msg.data === 'object') {
      for (const [k, v] of Object.entries(msg.data)) {
        if (!allData[k]) allData[k] = {};
        Object.assign(allData[k], v);
      }
      renderAll(allData);
    }
  });

  src.onerror = function() {
    document.getElementById('connDot').className = 'conn-dot';
    document.getElementById('connStatus').textContent = 'Reconnecting…';
  };
}

connect();

function extractCSV() {
  if (!Object.keys(allData).length) return;
  const rows = [['Rank','Agent Name','Email','Total','Resolved','On Hold']];
  const agents = Object.keys(allData).map(key => {
    const entries = Object.values(allData[key]);
    const email   = entries[0]?.agentEmail || key;
    return { email, total: entries.length, resolved: entries.filter(e=>e.status==='Resolved').length, onhold: entries.filter(e=>e.status==='On Hold').length };
  }).sort((a,b) => b.total - a.total);
  agents.forEach((a, i) => rows.push([i+1, displayName(a.email), a.email, a.total, a.resolved, a.onhold]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `team_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
