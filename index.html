<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Log Sheet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f9fa;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .container { max-width: 800px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .header p { font-size: 14px; color: #888; margin-top: 4px; }

  .btn-extract {
    padding: 10px 20px; border-radius: 8px; border: none;
    background: #ccc; color: #fff; font-size: 14px; font-weight: 600;
    cursor: not-allowed; display: flex; align-items: center; gap: 6px;
    transition: background 0.2s;
  }
  .btn-extract.active { background: #2e7d32; cursor: pointer; }
  .btn-extract.active:hover { background: #1b5e20; }

  /* Action buttons */
  .action-row {
    display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap;
  }
  .action-hint {
    font-size: 13px; color: #999; flex: 1;
  }
  .btn-resolved {
    padding: 12px 24px; border-radius: 8px; border: none;
    background: #2e7d32; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .btn-resolved:hover { background: #1b5e20; }
  .btn-onhold {
    padding: 12px 24px; border-radius: 8px; border: none;
    background: #f5a623; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .btn-onhold:hover { background: #d4891a; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .toast.show { opacity: 1; }

  /* Table */
  .table-wrap {
    background: #fff; border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .table-header {
    display: grid; grid-template-columns: 60px 1.4fr 1.5fr 1fr 50px;
    padding: 12px 18px; background: #f1f3f5; font-weight: 700;
    font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .empty-state {
    padding: 40px 18px; text-align: center; color: #aaa; font-size: 14px;
  }
  .table-row {
    display: grid; grid-template-columns: 60px 1.4fr 1.5fr 1fr 50px;
    padding: 12px 18px; align-items: center; border-top: 1px solid #f0f0f0;
    font-size: 14px; transition: background 0.15s;
  }
  .table-row:hover { background: #fafbfc; }
  .row-num { color: #999; font-weight: 600; }
  .row-ticket {
    font-weight: 600; color: #1a1a2e; font-family: monospace; font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 180px;
  }
  .row-time { color: #666; font-size: 13px; }

  /* Status badges */
  .status-badge {
    padding: 4px 10px; border-radius: 14px; font-size: 12px;
    font-weight: 600; cursor: pointer; outline: none;
  }
  .status-resolved { background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; }
  .status-onhold { background: #fff3e0; color: #e65100; border: 1.5px solid #ffcc80; }

  /* Remove button */
  .btn-remove {
    background: none; border: none; color: #ccc; font-size: 18px;
    cursor: pointer; transition: color 0.2s;
  }
  .btn-remove:hover { color: #e74c3c; }

  /* Footer */
  .table-footer {
    padding: 10px 18px; background: #f9fafb; border-top: 1px solid #f0f0f0;
    font-size: 13px; color: #888; display: flex; justify-content: space-between;
  }
  .table-footer b { color: #333; }
  .count-resolved { color: #2e7d32; }
  .count-onhold { color: #e65100; }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>Email Log Sheet</h1>
      <p>Auto-synced from Yellow.ai · or copy a ticket ID and click a button</p>
    </div>
    <button class="btn-extract" id="extractBtn" onclick="extractCSV()">
      <span style="font-size:16px">⬇</span> Extract CSV
    </button>
  </div>

  <!-- Action Buttons -->
  <div class="action-row">
    <button class="btn-resolved" onclick="logFromClipboard('Resolved')">✓ Resolved</button>
    <button class="btn-onhold" onclick="logFromClipboard('On Hold')">⏸ On Hold</button>
    <span class="action-hint">Entries auto-appear from Yellow.ai · clipboard buttons work as backup</span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <span>#</span><span>Email / Ticket</span><span>Timestamp</span><span>Status</span><span></span>
    </div>
    <div id="tableBody">
      <div class="empty-state">No entries yet. Copy an email or ticket ID and click a button above.</div>
    </div>
    <div id="tableFooter" style="display:none" class="table-footer">
      <span>Total entries: <b id="totalCount">0</b></span>
      <span>Resolved: <b class="count-resolved" id="resolvedCount">0</b> · On Hold: <b class="count-onhold" id="onholdCount">0</b></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let entries = JSON.parse(localStorage.getItem('yl_entries') || '[]');

  function save() {
    localStorage.setItem('yl_entries', JSON.stringify(entries));
  }

  // Handle entry passed via URL params (from bookmarklet)
  (function () {
    const p = new URLSearchParams(location.search);
    const ticket = p.get('ticket');
    const status = p.get('status');
    if (ticket && status) {
      const ts = new Date().toLocaleString('en-IN', {
        year: 'numeric', month: 'short', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
      });
      entries.push({ id: Date.now(), ticketId: ticket, timestamp: ts, status });
      save();
      // Clean URL without reloading
      history.replaceState(null, '', location.pathname);
    }
  })();

  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || '#333';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  async function logFromClipboard(status) {
    let text = '';
    try {
      text = await navigator.clipboard.readText();
    } catch (e) {
      showToast('Clipboard access denied. Allow clipboard permission and try again.', '#c0392b');
      return;
    }

    text = text.trim();
    if (!text) {
      showToast('Clipboard is empty — copy an email or ticket ID first.', '#888');
      return;
    }

    // Use first line only if multi-line (e.g. full email pasted)
    const label = text.split('\n')[0].trim().slice(0, 120);

    const now = new Date();
    const ts = now.toLocaleString('en-IN', {
      year: 'numeric', month: 'short', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    });

    entries.push({ id: Date.now(), ticketId: label, timestamp: ts, status });
    save();
    render();

    const color = status === 'Resolved' ? '#2e7d32' : '#f5a623';
    showToast(`Logged as ${status}: ${label.slice(0, 40)}${label.length > 40 ? '…' : ''}`, color);
  }

  function updateStatus(id, newStatus) {
    const e = entries.find(x => x.id === id);
    if (e) e.status = newStatus;
    save();
    render();
  }

  function removeEntry(id) {
    entries = entries.filter(x => x.id !== id);
    save();
    render();
  }

  function render() {
    const body = document.getElementById('tableBody');
    const footer = document.getElementById('tableFooter');
    const extractBtn = document.getElementById('extractBtn');

    if (entries.length === 0) {
      body.innerHTML = '<div class="empty-state">No entries yet. Copy an email or ticket ID and click a button above.</div>';
      footer.style.display = 'none';
      extractBtn.classList.remove('active');
      extractBtn.style.cursor = 'not-allowed';
      return;
    }

    extractBtn.classList.add('active');
    extractBtn.style.cursor = 'pointer';

    let html = '';
    entries.forEach((e, i) => {
      const cls = e.status === 'Resolved' ? 'status-resolved' : 'status-onhold';
      const safe = e.ticketId.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html += `
        <div class="table-row">
          <span class="row-num">${i + 1}</span>
          <span class="row-ticket" title="${safe}">${safe}</span>
          <span class="row-time">${e.timestamp}</span>
          <span>
            <select class="status-badge ${cls}" onchange="updateStatus(${e.id}, this.value)">
              <option value="Resolved" ${e.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
              <option value="On Hold" ${e.status === 'On Hold' ? 'selected' : ''}>On Hold</option>
            </select>
          </span>
          <span><button class="btn-remove" onclick="removeEntry(${e.id})" title="Remove">×</button></span>
        </div>`;
    });
    body.innerHTML = html;

    footer.style.display = 'flex';
    document.getElementById('totalCount').textContent = entries.length;
    document.getElementById('resolvedCount').textContent = entries.filter(e => e.status === 'Resolved').length;
    document.getElementById('onholdCount').textContent = entries.filter(e => e.status === 'On Hold').length;
  }

  render(); // show existing entries on load

  function extractCSV() {
    if (entries.length === 0) return;
    const header = 'Sr No,Email / Ticket,Timestamp,Status';
    const rows = entries.map((e, i) => `${i + 1},"${e.ticketId.replace(/"/g, '""')}","${e.timestamp}","${e.status}"`);
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `email_log_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
