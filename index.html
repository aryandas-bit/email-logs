<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Email Log Sheet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .container { max-width: 620px; margin: 0 auto; }

  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .conn-line { font-size: 13px; color: #888; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
  .conn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .conn-dot.live { background: #2e7d32; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn-export {
    padding: 9px 18px; border-radius: 8px; border: none;
    background: #ccc; color: #fff; font-size: 13px; font-weight: 600; cursor: not-allowed;
  }
  .btn-export.active { background: #2e7d32; cursor: pointer; }
  .btn-export.active:hover { background: #1b5e20; }

  /* Summary cards */
  .summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .card { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); flex: 1; min-width: 100px; }
  .card .label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .card .value { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-top: 4px; }
  .card .value.green { color: #2e7d32; }
  .card .value.orange { color: #e65100; }
  .card .value.blue { color: #1565c0; }

  /* Slot card */
  .slot-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 14px; overflow: hidden; }

  .slot-header { padding: 16px 20px; cursor: pointer; user-select: none; }
  .slot-header:hover { background: #fafbfc; }

  .slot-title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .slot-time { font-size: 18px; font-weight: 700; color: #1a1a2e; }
  .slot-pill { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; }
  .slot-pill.hold { background: #fff3e0; color: #e65100; }

  .slot-meta { font-size: 12px; color: #aaa; margin-top: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .slot-open-btn { font-size: 12px; color: #5c6bc0; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .slot-chevron { font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .slot-chevron.open { transform: rotate(180deg); }

  /* Agent list inside slot */
  .slot-report { display: none; border-top: 1px solid #f0f0f0; }
  .slot-report.open { display: block; }

  .agent-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f5f5f5; animation: fadeIn 0.3s ease; }
  .agent-row:last-child { border-bottom: none; }
  @keyframes fadeIn { from { background: #f0fff4; } to { background: transparent; } }

  .ag-rank { font-size: 14px; font-weight: 700; color: #ccc; width: 22px; text-align: center; flex-shrink: 0; }
  .ag-rank.top { color: #f5a623; }
  .ag-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .ag-name { flex: 1; font-size: 14px; font-weight: 600; color: #1a1a2e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ag-count { font-size: 20px; font-weight: 700; color: #1a1a2e; flex-shrink: 0; min-width: 28px; text-align: right; }
  .ag-bar-wrap { width: 80px; height: 4px; background: #f0f0f0; border-radius: 2px; flex-shrink: 0; }
  .ag-bar { height: 4px; border-radius: 2px; transition: width 0.4s; }

  .empty-overall { text-align: center; padding: 60px 20px; background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); color: #ccc; }
  .empty-overall p { margin-top: 8px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>Team Email Log Sheet</h1>
      <div class="conn-line">
        <span class="conn-dot" id="connDot"></span>
        <span id="connStatus">Connecting…</span>
      </div>
    </div>
    <button class="btn-export" id="exportBtn" onclick="extractCSV()">⬇ Export CSV</button>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="card"><div class="label">Agents</div><div class="value blue" id="cAgents">0</div></div>
    <div class="card"><div class="label">Total</div><div class="value" id="cTotal">0</div></div>
    <div class="card"><div class="label">Resolved</div><div class="value green" id="cResolved">0</div></div>
    <div class="card"><div class="label">On Hold</div><div class="value orange" id="cOnHold">0</div></div>
  </div>

  <div id="board">
    <div class="empty-overall">
      <strong style="font-size:18px;color:#ddd">No entries yet</strong>
      <p>Entries appear here instantly as agents log tickets on Yellow.ai</p>
    </div>
  </div>

</div>
<script>
const FIREBASE_URL = 'https://yl-logs-default-rtdb.firebaseio.com';

let allData = {};

const COLORS = ['#5c6bc0','#26a69a','#ef5350','#ab47bc','#42a5f5','#66bb6a','#ffa726','#ec407a'];
function avatarColor(key) { let h = 0; for (const c of key) h = (h * 31 + c.charCodeAt(0)) & 0xffffff; return COLORS[Math.abs(h) % COLORS.length]; }
function initials(email) { const n = (email||'?').split('@')[0].split(/[._\-]/); return n.length >= 2 ? (n[0][0]+n[1][0]).toUpperCase() : (email||'?').slice(0,2).toUpperCase(); }
function displayName(email) {
  const local = (email||'unknown').split('@')[0];
  // Strip trailing _ext or similar suffixes
  const clean = local.replace(/_ext$/i, '').replace(/[_\.]/g, ' ');
  return clean.split(' ').filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

// Returns { sortKey, label, dateStr, startStr, endStr } for a timestamp
function slotMeta(timestamp) {
  try {
    const d = new Date(timestamp);
    if (!isNaN(d)) {
      const h = d.getHours();
      const h12s = h % 12 || 12;
      const h12e = (h + 1) % 12 || 12;
      const ampmS = h < 12 ? 'AM' : 'PM';
      const ampmE = (h + 1) < 12 ? 'AM' : 'PM';
      const label = `${h12s}–${h12e} ${ampmE}`;
      const pad = n => String(n).padStart(2,'0');
      const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      const startStr = `${pad(h)}:00 ${ampmS}`;
      const endStr   = `${pad((h+1)%24)}:00 ${ampmE}`;
      // sortKey: descending by date+hour
      const sortKey = `${d.getFullYear()}${pad(d.getMonth())}${pad(d.getDate())}${pad(h)}`;
      return { sortKey, label, dateStr, startStr, endStr };
    }
  } catch (_) {}
  return { sortKey: '0', label: 'Other', dateStr: '', startStr: '', endStr: '' };
}

function renderAll(data) {
  allData = data || {};
  const board = document.getElementById('board');

  // Flatten all entries
  const allEntries = [];
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      allEntries.push({ ...entry, _agentKey: agentKey });
    }
  }

  if (allEntries.length === 0) {
    board.innerHTML = `<div class="empty-overall"><strong style="font-size:18px;color:#ddd">No entries yet</strong><p>Entries appear here instantly as agents log tickets on Yellow.ai</p></div>`;
    document.getElementById('summary').style.display = 'none';
    document.getElementById('exportBtn').classList.remove('active');
    return;
  }

  document.getElementById('summary').style.display = 'flex';
  document.getElementById('exportBtn').classList.add('active');

  // Preserve open panels
  const openSlots = new Set();
  board.querySelectorAll('.slot-report.open').forEach(el => openSlots.add(el.dataset.slot));

  // Group by slot
  const slots = {};
  for (const entry of allEntries) {
    const meta = slotMeta(entry.timestamp);
    if (!slots[meta.sortKey]) slots[meta.sortKey] = { meta, entries: [] };
    slots[meta.sortKey].entries.push(entry);
  }

  // Sort slots newest first
  const sortedSlotKeys = Object.keys(slots).sort((a, b) => b.localeCompare(a));

  // Summary
  const agentKeys = Object.keys(allData);
  const totalTickets  = allEntries.length;
  const totalResolved = allEntries.filter(e => e.status === 'Resolved').length;
  const totalOnHold   = allEntries.filter(e => e.status === 'On Hold').length;
  document.getElementById('cAgents').textContent   = agentKeys.length;
  document.getElementById('cTotal').textContent    = totalTickets;
  document.getElementById('cResolved').textContent = totalResolved;
  document.getElementById('cOnHold').textContent   = totalOnHold;

  const html = sortedSlotKeys.map(slotKey => {
    const { meta, entries } = slots[slotKey];
    const isOpen = openSlots.has(slotKey);
    const resolved = entries.filter(e => e.status === 'Resolved').length;
    const onhold   = entries.filter(e => e.status === 'On Hold').length;

    // Build per-agent counts for this slot
    const agentMap = {};
    for (const entry of entries) {
      const email = entry.agentEmail || entry._agentKey;
      const key   = entry._agentKey;
      if (!agentMap[key]) agentMap[key] = { email, key, count: 0 };
      agentMap[key].count++;
    }
    const agents = Object.values(agentMap).sort((a, b) => b.count - a.count);
    const maxCount = agents[0]?.count || 1;

    const agentRows = agents.map((a, i) => {
      const barPct = Math.round((a.count / maxCount) * 100);
      const color  = avatarColor(a.key);
      return `
        <div class="agent-row">
          <div class="ag-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
          <div class="ag-avatar" style="background:${color}">${initials(a.email)}</div>
          <div class="ag-name" title="${a.email}">${displayName(a.email)}</div>
          <div class="ag-bar-wrap"><div class="ag-bar" style="width:${barPct}%;background:${color}"></div></div>
          <div class="ag-count">${a.count}</div>
        </div>`;
    }).join('');

    return `
      <div class="slot-card">
        <div class="slot-header" onclick="toggleSlot('${slotKey}')">
          <div class="slot-title">
            <span class="slot-time">${meta.label}</span>
            ${resolved ? `<span class="slot-pill">${resolved} resolved</span>` : ''}
            ${onhold   ? `<span class="slot-pill hold">${onhold} on hold</span>` : ''}
          </div>
          <div class="slot-meta">
            <span>${meta.dateStr}${meta.startStr ? `, ${meta.startStr} → ${meta.endStr} IST` : ''}</span>
            <span class="slot-open-btn">
              Open report <span class="slot-chevron ${isOpen ? 'open' : ''}" id="schev-${slotKey}">▼</span>
            </span>
          </div>
        </div>
        <div class="slot-report ${isOpen ? 'open' : ''}" id="srep-${slotKey}" data-slot="${slotKey}">
          ${agentRows}
        </div>
      </div>`;
  }).join('');

  board.innerHTML = html;
}

function toggleSlot(key) {
  document.getElementById('srep-'  + key).classList.toggle('open');
  document.getElementById('schev-' + key).classList.toggle('open');
}

// ── Real-time Firebase SSE ──
function connect() {
  const src = new EventSource(FIREBASE_URL + '/entries.json');

  src.addEventListener('put', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      renderAll(msg.data);
    } else {
      const parts = msg.path.replace(/^\//, '').split('/');
      if (parts.length === 2) {
        const [agentKey, entryId] = parts;
        if (!allData[agentKey]) allData[agentKey] = {};
        allData[agentKey][entryId] = msg.data;
        renderAll(allData);
      }
    }
    document.getElementById('connDot').className = 'conn-dot live';
    document.getElementById('connStatus').textContent = 'Live';
  });

  src.addEventListener('patch', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.data && typeof msg.data === 'object') {
      for (const [k, v] of Object.entries(msg.data)) {
        if (!allData[k]) allData[k] = {};
        Object.assign(allData[k], v);
      }
      renderAll(allData);
    }
  });

  src.onerror = function() {
    document.getElementById('connDot').className = 'conn-dot';
    document.getElementById('connStatus').textContent = 'Reconnecting…';
  };
}

connect();

function extractCSV() {
  if (!Object.keys(allData).length) return;
  const rows = [['Time Slot','Date','Agent','Email','Ticket','Status','Timestamp']];
  const allEntries = [];
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      const meta = slotMeta(entry.timestamp);
      rows.push([meta.label, meta.dateStr, displayName(entry.agentEmail||agentKey), entry.agentEmail||agentKey, entry.ticketId, entry.status, entry.timestamp]);
    }
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `team_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
