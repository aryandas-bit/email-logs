  .date-clear { padding: 8px 10px; border-radius: 8px; border: 1.5px solid #e8e8e8; background: #fff; font-size: 12px; font-weight: 600; color: #aaa; cursor: pointer; }

<div class="container">

      <button class="btn-export" id="exportBtn" onclick="extractCSV()">⬇ Export CSV</button>
      <button class="btn-export" id="shiftReportBtn" onclick="extractShiftReport()" style="background:#1565c0">⬇ Shift Report</button>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="card" onclick="showAgentsModal()" style="cursor:pointer" title="Click to see agents"><div class="label">Agents</div><div class="value blue" id="cAgents">0</div></div>
    <div class="card"><div class="label">Total</div><div class="value" id="cTotal">0</div></div>
    <div class="card"><div class="label">Resolved</div><div class="value green" id="cResolved">0</div></div>
    <div class="card"><div class="label">On Hold</div><div class="value orange" id="cOnHold">0</div></div>
  </div>

  <!-- Agents modal -->
  <div class="mag-overlay" id="mag-overlay" onclick="if(event.target===this)closeAgentsModal()">
    <div class="mag-box">
      <div class="mag-header">
        <div>
          <h2>Agents</h2>
          <div class="mag-live-badge" id="mag-live-count"></div>
        </div>
        <span class="mag-close" onclick="closeAgentsModal()">×</span>
      </div>
      <div class="mag-shift-tabs" id="mag-shift-tabs"></div>
      <div class="mag-list" id="mag-list"></div>
    </div>
  </div>

  <div id="board">
    <div class="empty-overall">
      <strong style="font-size:18px;color:#ddd">No entries yet</strong>
      <p>Entries appear here instantly as agents log tickets on Yellow.ai</p>
    </div>
  </div>

</div>
<script>
const FIREBASE_URL = 'https://yl-logs-default-rtdb.firebaseio.com';

let allData = {};
let liveHeartbeats = {};
let activeDateFilter = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' }); // YYYY-MM-DD, default today

function setDateFilter(val) {
  activeDateFilter = val;
  document.getElementById('datePicker').value = val;
  renderAll(allData);
}

function entryMatchesDate(entry) {
  if (!activeDateFilter) return true;
  // activeDateFilter = "2026-03-11", entry.timestamp = "11 Mar 2026, 09:02:34 PM"
  const entryDate = (entry.timestamp || '').split(',')[0].trim(); // "11 Mar 2026"
  const d = new Date(activeDateFilter + 'T00:00:00');
  const target = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); // "11 Mar 2026"
  return entryDate === target;
}

const COLORS = ['#5c6bc0','#26a69a','#ef5350','#ab47bc','#42a5f5','#66bb6a','#ffa726','#ec407a'];
function avatarColor(key) { let h = 0; for (const c of key) h = (h * 31 + c.charCodeAt(0)) & 0xffffff; return COLORS[Math.abs(h) % COLORS.length]; }
function initials(email) { const n = (email||'?').split('@')[0].split(/[._\-]/); return n.length >= 2 ? (n[0][0]+n[1][0]).toUpperCase() : (email||'?').slice(0,2).toUpperCase(); }
function displayName(email) {
  const local = (email||'unknown').split('@')[0];
  const clean = local.replace(/_ext$/i, '').replace(/[_\.]/g, ' ');
  return clean.split(' ').filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

  'divyansh mishra':         { shift: 'Night',     time: '10PM–7AM',  vendor: 'Inhouse',  ch: 'Email' },
  'prateek govila':          { shift: 'Night',     time: '10PM–7AM',  vendor: 'Inhouse',  ch: 'Email' },
  'swapna mishra':           { shift: 'Night',     time: '10PM–7AM',  vendor: 'Inhouse',  ch: 'Email' },
};
function rosterInfo(email) {
  const key = displayName(email).toLowerCase().replace(/\s+/g, ' ').trim();
  return ROSTER[key] || null;
}

// Returns { sortKey, label, dateStr, startStr, endStr } for a timestamp
function slotMeta(timestamp) {
  try {
    const d = new Date(timestamp);
    if (!isNaN(d)) {
      const h = d.getHours();
      const h12s = h % 12 || 12;
      const h12e = (h + 1) % 12 || 12;
      const ampmS = h < 12 ? 'AM' : 'PM';
      const ampmE = (h + 1) < 12 ? 'AM' : 'PM';
      const label = `${h12s}–${h12e} ${ampmE}`;
      const pad = n => String(n).padStart(2,'0');
      const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      const startStr = `${pad(h)}:00 ${ampmS}`;
      const endStr   = `${pad((h+1)%24)}:00 ${ampmE}`;
      const sortKey = `${d.getFullYear()}${pad(d.getMonth())}${pad(d.getDate())}${pad(h)}`;
      return { sortKey, label, dateStr, startStr, endStr };
    }
  } catch (_) {}
  return { sortKey: '0', label: 'Other', dateStr: '', startStr: '', endStr: '' };
}

function renderAll(data) {
  allData = data || {};
  const board = document.getElementById('board');

  // Flatten + validate + date filter
  const allEntries = [];
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      if (!entry || !entry.ticketId) continue;
      if (/^Ticket-\d+$/i.test(entry.ticketId) || !/^\d{1,5}$/.test(entry.ticketId)) continue;
      if (!entryMatchesDate(entry)) continue;
      allEntries.push({ ...entry, _agentKey: agentKey });
    }
  }

  if (allEntries.length === 0) {
    board.innerHTML = `<div class="empty-overall"><strong style="font-size:18px;color:#ddd">No entries yet</strong><p>Entries appear here instantly as agents log tickets on Yellow.ai</p></div>`;
    document.getElementById('summary').style.display = 'none';
    document.getElementById('exportBtn').classList.remove('active');
    return;
  }

  document.getElementById('summary').style.display = 'flex';
  document.getElementById('exportBtn').classList.add('active');

  const activeAgentKeys = new Set(allEntries.map(e => e._agentKey));
  document.getElementById('cAgents').textContent   = activeAgentKeys.size;
  document.getElementById('cTotal').textContent    = allEntries.length;
  document.getElementById('cResolved').textContent = allEntries.filter(e => e.status === 'Resolved').length;
  document.getElementById('cOnHold').textContent   = allEntries.filter(e => e.status === 'On Hold').length;

  // Preserve open panels
  const openSlots = new Set();
  board.querySelectorAll('.slot-report.open').forEach(el => openSlots.add(el.dataset.slot));

  // Group by shift bracket
  const slots = {};
  for (const entry of allEntries) {
    const meta = slotMeta(entry.timestamp);
    if (!slots[meta.sortKey]) slots[meta.sortKey] = { meta, entries: [] };
    slots[meta.sortKey].entries.push(entry);
  }

  // Sort newest first
  const sortedSlotKeys = Object.keys(slots).sort((a, b) => b.localeCompare(a));

  const html = sortedSlotKeys.map(slotKey => {
    const { meta, entries } = slots[slotKey];
    const isOpen   = openSlots.has(slotKey);
    const resolved = entries.filter(e => e.status === 'Resolved').length;
    const onhold   = entries.filter(e => e.status === 'On Hold').length;

    // Per-agent counts for this slot
    const agentMap = {};
    for (const entry of entries) {
      const email = entry.agentEmail || entry._agentKey;
      const key   = entry._agentKey;
      if (!agentMap[key]) agentMap[key] = { email, key, count: 0, resolved: 0, onhold: 0 };
      agentMap[key].count++;
      if (entry.status === 'Resolved') agentMap[key].resolved++;
      else agentMap[key].onhold++;
    }
    const agents   = Object.values(agentMap).sort((a, b) => b.count - a.count);
    const maxCount = agents[0]?.count || 1;

    const agentRows = agents.map((a, i) => {
      const barPct = Math.round((a.count / maxCount) * 100);
      const color  = avatarColor(a.key);
      const breakdown = [
        a.resolved ? `<span class="res">${a.resolved} resolved</span>` : '',
        a.onhold   ? `<span class="hld">${a.onhold} on hold</span>`   : ''
      ].filter(Boolean).join(' · ');
      return `
        <div class="agent-row">
          <div class="ag-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
          <div class="ag-avatar" style="background:${color}">${initials(a.email)}</div>
          <div class="ag-info">
            <div class="ag-name" title="${a.email}">${displayName(a.email)}</div>
            <div class="ag-breakdown">${breakdown}</div>
          </div>
          <div class="ag-bar-wrap"><div class="ag-bar" style="width:${barPct}%;background:${color}"></div></div>
          <div class="ag-count">${a.count}</div>
        </div>`;
    }).join('');

    return `
      <div class="slot-card">
        <div class="slot-header" onclick="toggleSlot('${slotKey}')">
          <div class="slot-title">
            <span class="slot-time">${meta.label}</span>
            ${resolved ? `<span class="slot-pill">${resolved} resolved</span>` : ''}
            ${onhold   ? `<span class="slot-pill hold">${onhold} on hold</span>` : ''}
          </div>
          <div class="slot-meta">
            <span>${meta.dateStr}${meta.startStr ? `, ${meta.startStr} → ${meta.endStr} IST` : ''}</span>
            <span class="slot-open-btn">
              Open report <span class="slot-chevron ${isOpen ? 'open' : ''}" id="schev-${slotKey}">▼</span>
            </span>
          </div>
        </div>
        <div class="slot-report ${isOpen ? 'open' : ''}" id="srep-${slotKey}" data-slot="${slotKey}">
          ${agentRows}
        </div>
      </div>`;
  }).join('');

  board.innerHTML = html;
}

function toggleSlot(key) {
  document.getElementById('srep-'  + key).classList.toggle('open');
  document.getElementById('schev-' + key).classList.toggle('open');
}

function clearAllData() {
  if (!confirm('Delete ALL entries from Firebase? This cannot be undone.')) return;
  fetch(FIREBASE_URL + '/entries.json', { method: 'DELETE' })
    .then(() => { allData = {}; renderAll({}); })
    .catch(() => alert('Delete failed — check Firebase connection.'));
}

// ── Real-time Firebase SSE ──
function connect() {
  const src = new EventSource(FIREBASE_URL + '/entries.json');

  src.addEventListener('put', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      renderAll(msg.data);
    } else {
      const parts = msg.path.replace(/^\//, '').split('/');
      if (parts.length === 2) {
        const [agentKey, entryId] = parts;
        if (msg.data === null) {
          if (allData[agentKey]) delete allData[agentKey][entryId];
        } else {
          if (!allData[agentKey]) allData[agentKey] = {};
          allData[agentKey][entryId] = msg.data;
        }
        renderAll(allData);
      }
    }
    document.getElementById('connDot').className = 'conn-dot live';
    document.getElementById('connStatus').textContent = 'Live';
  });

  src.addEventListener('patch', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.data && typeof msg.data === 'object') {
      for (const [k, v] of Object.entries(msg.data)) {
        if (!allData[k]) allData[k] = {};
        Object.assign(allData[k], v);
      }
      renderAll(allData);
    }
  });

  src.onerror = function() {
    document.getElementById('connDot').className = 'conn-dot';
    document.getElementById('connStatus').textContent = 'Reconnecting…';
  };
}

document.getElementById('datePicker').value = activeDateFilter;
connect();

// ── Heartbeat SSE ──
function connectHeartbeats() {
  const src = new EventSource(FIREBASE_URL + '/heartbeats.json');
  src.addEventListener('put', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      liveHeartbeats = msg.data || {};
    } else {
      const key = msg.path.replace(/^\//, '');
      if (msg.data === null) delete liveHeartbeats[key];
      else liveHeartbeats[key] = msg.data;
    }
  });
}
connectHeartbeats();

function showAgentsModal() {
  const now = Date.now();
  const twoMin = 2 * 60 * 1000;

  // Build map of agents who have logged entries
  const loggedMap = {};
  for (const [key, entries] of Object.entries(allData)) {
    const list = Object.values(entries).filter(e => e && e.ticketId && !/^Ticket-\d+$/i.test(e.ticketId) && /^\d{1,5}$/.test(e.ticketId) && entryMatchesDate(e));
    if (!list.length) continue;
    const email = list[0]?.agentEmail || key;
    const hb    = liveHeartbeats[key];
    loggedMap[displayName(email).toLowerCase()] = {
      key, email,
      total:    list.length,
      resolved: list.filter(e => e.status === 'Resolved').length,
      onhold:   list.filter(e => e.status === 'On Hold').length,
      isLive:   hb && (now - hb.lastSeen) < twoMin,
    };
  }

  // Merge with full roster — roster agents not yet logged show as 0
  const seen = new Set();
  const agents = [];
  // First: logged agents
  for (const a of Object.values(loggedMap)) {
    const nameKey = displayName(a.email).toLowerCase();
    seen.add(nameKey);
    agents.push(a);
  }
  agents.sort((a, b) => b.total - a.total);

  const liveCount = agents.filter(a => a.isLive).length;
  document.getElementById('mag-live-count').textContent = liveCount + ' online now';

  // Build shift tabs from unique shifts present
  const shiftOrder = ['Morning 1','Morning 2','Evening 1','Evening 2','Evening 3','Evening 4','Night'];
  const shiftsPresent = ['All', ...shiftOrder.filter(s => agents.some(a => {
    const ri = rosterInfo(a.email);
    return ri && ri.shift === s;
  }))];

  let activeShiftTab = 'All';

  function renderModalList() {
    const filtered = activeShiftTab === 'All' ? agents : agents.filter(a => {
      const ri = rosterInfo(a.email);
      return ri && ri.shift === activeShiftTab;
    });
    document.getElementById('mag-list').innerHTML = filtered.map(a => {
      const ri      = rosterInfo(a.email);
      const name    = displayName(a.email);
      const subLine = ri ? `<span class="shift-tag">${ri.shift} · ${ri.time}</span>` : '';
      const statsLine = `${a.resolved ? `<span class="res">${a.resolved} resolved</span>` : ''}${a.onhold ? `<span class="hld"> · ${a.onhold} on hold</span>` : ''}`;
      return `
      <div class="mag-row">
        <div class="mag-dot ${a.isLive ? 'live' : ''}"></div>
        <div class="mag-avatar" style="background:${avatarColor(a.key)}">${name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
        <div class="mag-info">
          <div class="mag-name">${name}</div>
          <div class="mag-stats">${statsLine}</div>
          ${subLine ? `<div class="mag-sub">${subLine}</div>` : ''}
        </div>
        <div class="mag-total">${a.total}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('mag-shift-tabs').innerHTML = shiftsPresent.map(s => `
    <button class="mag-tab ${s === activeShiftTab ? 'active' : ''}" onclick="setModalShift('${s}')">${s}</button>
  `).join('');

  window._modalAgents = agents;
  window.setModalShift = function(s) {
    activeShiftTab = s;
    document.querySelectorAll('.mag-tab').forEach(t => t.classList.toggle('active', t.textContent.trim() === s));
    renderModalList();
  };

  renderModalList();
  document.getElementById('mag-overlay').style.display = 'flex';
}

function closeAgentsModal() {
  document.getElementById('mag-overlay').style.display = 'none';
}

function extractShiftReport() {
  if (!Object.keys(allData).length) return;

  // Parse shift time string like "5PM–2AM" into start/end hours (24h)
  function parseShiftHours(timeStr) {
    if (!timeStr) return null;
    const m = timeStr.match(/(\d+)(AM|PM)[–\-](\d+)(AM|PM)/i);
    if (!m) return null;
    let [, sh, sa, eh, ea] = m;
    sh = parseInt(sh); eh = parseInt(eh);
    if (sa.toUpperCase() === 'PM' && sh !== 12) sh += 12;
    if (sa.toUpperCase() === 'AM' && sh === 12) sh = 0;
    if (ea.toUpperCase() === 'PM' && eh !== 12) eh += 12;
    if (ea.toUpperCase() === 'AM' && eh === 12) eh = 0;
    return { start: sh, end: eh };
  }

  // Build hourly slots for a shift (handles overnight shifts like 5PM–2AM)
  function shiftSlots(timeStr) {
    const h = parseShiftHours(timeStr);
    if (!h) return null;
    const slots = [];
    let cur = h.start;
    while (cur !== h.end) {
      const next = (cur + 1) % 24;
      const fmt = h => {
        if (h === 0) return '12 AM';
        if (h === 12) return '12 PM';
        return h < 12 ? `${h} AM` : `${h - 12} PM`;
      };
      slots.push({ label: `${fmt(cur)}–${fmt(next)}`, hour: cur });
      cur = next;
    }
    return slots;
  }

  // Collect all entries per agent per date per hour
  const agentData = {}; // agentKey → date → hour → {resolved, onhold}
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      if (!entry || !entry.ticketId) continue;
      if (/^Ticket-\d+$/i.test(entry.ticketId) || !/^\d{1,5}$/.test(entry.ticketId)) continue;
      const ts = entry.timestamp || '';
      let entryDate, entryHour;
      try {
        const d = new Date(ts.replace(/(\d+) (\w+) (\d+), (.+)/, '$2 $1, $3, $4'));
        entryDate = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        entryHour = d.getHours();
        if (isNaN(entryHour)) throw new Error();
      } catch {
        entryDate = ts.split(',')[0].trim();
        const hm = ts.match(/(\d+):(\d+):\d+\s*(am|pm)/i);
        if (!hm) continue;
        entryHour = parseInt(hm[1]);
        if (hm[3].toLowerCase() === 'pm' && entryHour !== 12) entryHour += 12;
        if (hm[3].toLowerCase() === 'am' && entryHour === 12) entryHour = 0;
      }
      const email = entry.agentEmail || agentKey;
      if (!agentData[email]) agentData[email] = {};
      if (!agentData[email][entryDate]) agentData[email][entryDate] = {};
      if (!agentData[email][entryDate][entryHour]) agentData[email][entryDate][entryHour] = { resolved: 0, onhold: 0 };
      if (entry.status === 'Resolved') agentData[email][entryDate][entryHour].resolved++;
      else if (entry.status === 'On Hold') agentData[email][entryDate][entryHour].onhold++;
    }
  }

  const rows = [['Agent', 'Date', 'Shift', 'Hour Slot', 'Resolved', 'On Hold', 'Total']];
  for (const [email, dates] of Object.entries(agentData)) {
    const name = displayName(email);
    const ri = rosterInfo(email);
    const shift = ri ? ri.shift : 'Unknown';
    const shiftTime = ri ? ri.time : '';
    const slots = shiftSlots(shiftTime);
    for (const [date, hours] of Object.entries(dates)) {
      if (slots) {
        for (const slot of slots) {
          const h = hours[slot.hour] || { resolved: 0, onhold: 0 };
          if (h.resolved + h.onhold === 0) continue;
          rows.push([name, date, `${shift} (${shiftTime})`, slot.label, h.resolved, h.onhold, h.resolved + h.onhold]);
        }
      } else {
        // No roster info — just dump all hours
        for (const [hour, h] of Object.entries(hours)) {
          const fmt = h => h == 0 ? '12 AM' : h < 12 ? `${h} AM` : h == 12 ? '12 PM' : `${h-12} PM`;
          rows.push([name, date, 'Unknown', `${fmt(parseInt(hour))}–${fmt((parseInt(hour)+1)%24)}`, h.resolved, h.onhold, h.resolved + h.onhold]);
        }
      }
    }
  }

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `shift_report_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function extractCSV() {
  if (!Object.keys(allData).length) return;
  const rows = [['Time Slot','Date','Agent','Email','Ticket','Status','Timestamp']];
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      if (!entry || !entry.ticketId) continue;
      if (/^Ticket-\d+$/i.test(entry.ticketId) || !/^\d{1,5}$/.test(entry.ticketId)) continue;
      const meta = slotMeta(entry.timestamp);
      rows.push([meta.label, meta.dateStr, displayName(entry.agentEmail||agentKey), entry.agentEmail||agentKey, entry.ticketId, entry.status, entry.timestamp]);
    }
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `team_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
