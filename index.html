<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Email Log Sheet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .container { max-width: 620px; margin: 0 auto; }

  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .conn-line { font-size: 13px; color: #888; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
  .conn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .conn-dot.live { background: #2e7d32; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn-export {
    padding: 9px 18px; border-radius: 8px; border: none;
    background: #ccc; color: #fff; font-size: 13px; font-weight: 600; cursor: not-allowed;
  }
  .btn-export.active { background: #2e7d32; cursor: pointer; }
  .btn-export.active:hover { background: #1b5e20; }
  .btn-clear { padding: 9px 18px; border-radius: 8px; border: none; background: #fee2e2; color: #dc2626; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-clear:hover { background: #fca5a5; }
  .date-wrap { display: flex; align-items: center; gap: 6px; }
  .date-input { padding: 8px 10px; border-radius: 8px; border: 1.5px solid #e8e8e8; font-size: 13px; font-family: inherit; color: #1a1a2e; background: #fff; cursor: pointer; }
  .date-input:focus { outline: none; border-color: #5c6bc0; }
  .date-clear { padding: 8px 10px; border-radius: 8px; border: 1.5px solid #e8e8e8; background: #fff; font-size: 12px; font-weight: 600; color: #aaa; cursor: pointer; }
  .date-clear:hover { border-color: #bbb; color: #555; }
  .view-tabs { display: inline-flex; gap: 6px; padding: 5px; background: #fff; border-radius: 12px; box-shadow: 0 1px 5px rgba(0,0,0,0.07); }
  .view-tab { padding: 8px 14px; border-radius: 9px; border: none; background: transparent; color: #777; font-size: 13px; font-weight: 700; cursor: pointer; }
  .view-tab.active { background: #1a1a2e; color: #fff; }
  .view-tab:hover:not(.active) { background: #f5f6f8; color: #333; }

  /* Summary cards */
  .summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .card { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); flex: 1; min-width: 100px; }
  .card .label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .card .value { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-top: 4px; }
  .card .value.green { color: #2e7d32; }
  .card .value.orange { color: #e65100; }
  .card .value.blue { color: #1565c0; }
  .card .value.red { color: #c62828; }
  .card .value.gray { color: #616161; }

  /* Slot card */
  .slot-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 14px; overflow: hidden; }

  .slot-header { padding: 16px 20px; cursor: pointer; user-select: none; }
  .slot-header:hover { background: #fafbfc; }

  .slot-title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .slot-time { font-size: 18px; font-weight: 700; color: #1a1a2e; }
  .slot-pill { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; }
  .slot-pill.hold { background: #fff3e0; color: #e65100; }

  .slot-meta { font-size: 12px; color: #aaa; margin-top: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .slot-open-btn { font-size: 12px; color: #5c6bc0; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .slot-chevron { font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .slot-chevron.open { transform: rotate(180deg); }

  /* Agent list inside slot */
  .slot-report { display: none; border-top: 1px solid #f0f0f0; }
  .slot-report.open { display: block; }
  .entry-list { border-top: 1px solid #2a2a2a; margin-top: 6px; padding: 4px 0; }
  .entry-row { display: flex; align-items: center; gap: 10px; padding: 5px 16px; font-size: 12px; color: #aaa; border-bottom: 1px solid #1e1e1e; }
  .entry-row:last-child { border-bottom: none; }
  .entry-ticket { font-weight: 600; color: #ddd; min-width: 48px; }
  .entry-agent { flex: 1; color: #bbb; }
  .entry-time { color: #666; font-size: 11px; }
  .entry-del { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
  .entry-del:hover { color: #e55; }

  .agent-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f5f5f5; animation: fadeIn 0.3s ease; }
  .agent-row:last-child { border-bottom: none; }
  @keyframes fadeIn { from { background: #f0fff4; } to { background: transparent; } }

  .ag-rank { font-size: 14px; font-weight: 700; color: #ccc; width: 22px; text-align: center; flex-shrink: 0; }
  .ag-rank.top { color: #f5a623; }
  .ag-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .ag-info { flex: 1; min-width: 0; }
  .ag-name { font-size: 14px; font-weight: 600; color: #1a1a2e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ag-breakdown { font-size: 11px; color: #aaa; margin-top: 2px; }
  .ag-breakdown .res { color: #2e7d32; font-weight: 600; }
  .ag-breakdown .hld { color: #e65100; font-weight: 600; }
  .ag-count { font-size: 20px; font-weight: 700; color: #1a1a2e; flex-shrink: 0; min-width: 28px; text-align: right; }
  .ag-bar-wrap { width: 80px; height: 4px; background: #f0f0f0; border-radius: 2px; flex-shrink: 0; }
  .ag-bar { height: 4px; border-radius: 2px; transition: width 0.4s; }

  .empty-overall { text-align: center; padding: 60px 20px; background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); color: #ccc; }
  .empty-overall p { margin-top: 8px; font-size: 14px; }

  /* Agents modal */
  .mag-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; }
  .mag-box { background: #fff; border-radius: 14px; width: 360px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.18); overflow: hidden; }
  .mag-header { padding: 18px 20px 14px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: flex-start; }
  .mag-header h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .mag-live-badge { font-size: 12px; color: #2e7d32; font-weight: 600; display: flex; align-items: center; gap: 5px; margin-top: 3px; }
  .mag-live-badge::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #2e7d32; animation: pulse 2s infinite; }
  .mag-close { font-size: 20px; color: #aaa; cursor: pointer; line-height: 1; padding: 0 4px; }
  .mag-close:hover { color: #555; }
  .mag-shift-tabs { display: flex; gap: 6px; padding: 10px 16px 6px; flex-wrap: wrap; border-bottom: 1px solid #f0f0f0; }
  .mag-tab { padding: 3px 10px; border-radius: 12px; border: 1.5px solid #e8e8e8; background: #fff; font-size: 11px; font-weight: 600; color: #999; cursor: pointer; }
  .mag-tab:hover { border-color: #bbb; color: #555; }
  .mag-tab.active { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }
  .mag-list { overflow-y: auto; padding: 8px 0; }
  .mag-row { display: flex; align-items: center; gap: 10px; padding: 10px 20px; }
  .mag-row:hover { background: #fafbfc; }
  .mag-dot { width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0; flex-shrink: 0; }
  .mag-dot.live { background: #2e7d32; animation: pulse 2s infinite; }
  .mag-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .mag-info { flex: 1; min-width: 0; }
  .mag-name { font-size: 13px; font-weight: 600; color: #1a1a2e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mag-stats { font-size: 11px; color: #aaa; margin-top: 1px; }
  .mag-stats .res { color: #2e7d32; font-weight: 600; }
  .mag-stats .hld { color: #e65100; font-weight: 600; }
  .mag-sub { font-size: 10px; color: #bbb; margin-top: 2px; }
  .mag-sub .shift-tag { font-weight: 600; color: #888; }
  .mag-total { font-size: 16px; font-weight: 700; color: #1a1a2e; flex-shrink: 0; }

  .att-note { font-size: 12px; color: #7a7a7a; margin: -8px 0 18px; }
  .att-board { display: grid; gap: 14px; }
  .att-group { background: #fff; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden; }
  .att-group-header { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: start; gap: 12px; padding: 16px 18px; border-bottom: 1px solid #f2f2f2; }
  .att-group-header > div:first-child { min-width: 0; }
  .att-group-title { font-size: 16px; font-weight: 700; color: #1a1a2e; overflow-wrap: anywhere; }
  .att-group-sub { font-size: 12px; color: #8a8a8a; margin-top: 3px; }
  .att-group-meta { font-size: 12px; font-weight: 700; color: #2e7d32; text-align: right; white-space: nowrap; }
  .att-row { display: grid; grid-template-columns: 10px 34px minmax(0, 1fr) auto; align-items: center; column-gap: 12px; row-gap: 8px; padding: 12px 18px; border-bottom: 1px solid #f7f7f7; }
  .att-row:last-child { border-bottom: none; }
  .att-presence { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: #d0d0d0; }
  .att-presence.present { background: #2e7d32; box-shadow: 0 0 0 4px rgba(46,125,50,0.12); }
  .att-presence.offline { background: #c62828; box-shadow: 0 0 0 4px rgba(198,40,40,0.08); }
  .att-presence.idle { background: #ef6c00; box-shadow: 0 0 0 4px rgba(239,108,0,0.08); }
  .att-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .att-info { flex: 1; min-width: 0; }
  .att-name { font-size: 14px; font-weight: 700; color: #1a1a2e; overflow-wrap: anywhere; }
  .att-sub { font-size: 11px; color: #8c8c8c; margin-top: 3px; }
  .att-status { text-align: right; min-width: 110px; }
  .att-status-label { font-size: 12px; font-weight: 700; }
  .att-status-label.present { color: #2e7d32; }
  .att-status-label.idle { color: #ef6c00; }
  .att-status-label.offline { color: #c62828; }
  .att-status-time { font-size: 11px; color: #999; margin-top: 3px; }

  /* ── Sessions view ── */
  .sess-section { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#bbb; margin:0 0 10px; }
  .sess-section:not(:first-child) { margin-top:20px; }
  .sess-card { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:14px 16px; margin-bottom:10px; display:flex; align-items:flex-start; gap:12px; }
  .sess-avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; margin-top:1px; }
  .sess-body { flex:1; min-width:0; }
  .sess-row1 { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .sess-name { flex:1; font-size:14px; font-weight:600; color:#1a1a2e; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sess-badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:999px; flex-shrink:0; }
  .sess-dur { font-size:14px; font-weight:700; color:#1a1a2e; font-variant-numeric:tabular-nums; flex-shrink:0; }
  .sess-meta { font-size:11px; color:#aaa; margin-bottom:8px; }
  .sess-bar { height:5px; border-radius:3px; display:flex; overflow:hidden; background:#f0f0f0; margin-bottom:6px; }
  .sess-breakdown { display:flex; flex-wrap:wrap; gap:10px; }
  .sess-bk { display:flex; align-items:center; gap:4px; font-size:11px; color:#777; }
  .sess-dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }


  /* Daily report */
  .dr-header-card { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:16px 20px; margin-bottom:14px; }
  .dr-date-range  { font-size:12px; color:#888; margin-top:3px; }
  .dr-totals      { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; align-items:center; }
  .dr-chip        { font-size:13px; font-weight:700; }
  .dr-sep         { color:#ddd; font-weight:400; }
  .dr-section-title { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#bbb; margin:16px 0 8px; }
  .dr-table-wrap  { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.08); overflow:hidden; margin-bottom:14px; }
  .dr-table       { width:100%; border-collapse:collapse; font-size:13px; }
  .dr-table th    { background:#f5f6f8; padding:9px 14px; text-align:left; font-size:11px; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:.04em; }
  .dr-table th:nth-child(n+3) { text-align:right; }
  .dr-table td    { padding:11px 14px; border-top:1px solid #f3f3f3; color:#1a1a2e; vertical-align:middle; }
  .dr-table td:nth-child(n+3) { text-align:right; font-variant-numeric:tabular-nums; }
  .dr-table tr:hover td { background:#fafbfc; }
  .dr-rank  { color:#bbb; font-weight:700; width:28px; }
  .dr-name  { font-weight:600; }
  .dr-res   { color:#2e7d32; font-weight:700; }
  .dr-hld   { color:#e65100; font-weight:700; }
  .dr-tot   { font-weight:700; }
  .dr-dash  { color:#ccc; }

  @media (max-width: 640px) {
    .att-group-header { grid-template-columns: 1fr; }
    .att-group-meta { text-align: left; white-space: normal; }
    .att-row { grid-template-columns: 10px 34px minmax(0, 1fr); align-items: flex-start; }
    .att-info { min-width: 0; }
    .att-status {
      min-width: 0;
      grid-column: 2 / 4;
      text-align: left;
      padding-left: 0;
    }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>Team Email Log Sheet</h1>
      <div class="conn-line">
        <span class="conn-dot" id="connDot"></span>
        <span id="connStatus">Connecting…</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="view-tabs">
        <button class="view-tab active" id="tabLogs" onclick="setView('logs')">Ticket Log</button>
        <button class="view-tab" id="tabSessions" onclick="setView('sessions')">Sessions</button>
        <button class="view-tab" id="tabDaily" onclick="setView('daily')">Daily Report</button>
      </div>
      <div class="date-wrap">
        <input class="date-input" type="date" id="datePicker" onchange="setDateFilter(this.value)">
        <button class="date-clear" onclick="setDateFilter('')" title="Show all dates">All</button>
      </div>
      <button class="btn-export" id="exportBtn" onclick="extractCSV()">⬇ Export CSV</button>
      <button class="btn-export" id="shiftReportBtn" onclick="extractShiftReport()" style="background:#1565c0">⬇ Shift Report</button>
      <button class="btn-export" id="dailyReportBtn" onclick="extractDailyCSV()" style="display:none">⬇ Daily CSV</button>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="card" onclick="showAgentsModal()" style="cursor:pointer" title="Click to see agents"><div class="label">Agents</div><div class="value blue" id="cAgents">0</div></div>
    <div class="card"><div class="label">Total</div><div class="value" id="cTotal">0</div></div>
    <div class="card"><div class="label">Resolved</div><div class="value green" id="cResolved">0</div></div>
    <div class="card"><div class="label">On Hold</div><div class="value orange" id="cOnHold">0</div></div>
  </div>


  <!-- Agents modal -->
  <div class="mag-overlay" id="mag-overlay" onclick="if(event.target===this)closeAgentsModal()">
    <div class="mag-box">
      <div class="mag-header">
        <div>
          <h2>Agents</h2>
          <div class="mag-live-badge" id="mag-live-count"></div>
        </div>
        <span class="mag-close" onclick="closeAgentsModal()">×</span>
      </div>
      <div class="mag-shift-tabs" id="mag-shift-tabs"></div>
      <div class="mag-list" id="mag-list"></div>
    </div>
  </div>

  <div id="board">
    <div class="empty-overall">
      <strong style="font-size:18px;color:#ddd">No entries yet</strong>
      <p>Entries appear here instantly as agents log tickets on Yellow.ai</p>
    </div>
  </div>

</div>
<script>
const FIREBASE_URL = 'https://yl-logs-default-rtdb.firebaseio.com';

let allData = {};
let liveHeartbeats = {};
let activeDateFilter = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' }); // YYYY-MM-DD, default today
let activeView = 'logs';

function setDateFilter(val) {
  activeDateFilter = val;
  document.getElementById('datePicker').value = val;
  render();
}

function istNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
}

function todayIstKey() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
}


function setView(view) {
  activeView = view;
  document.getElementById('tabLogs').classList.toggle('active', view === 'logs');
  document.getElementById('tabSessions').classList.toggle('active', view === 'sessions');
  document.getElementById('tabDaily').classList.toggle('active', view === 'daily');
  document.getElementById('datePicker').disabled = false;
  document.getElementById('exportBtn').style.display = view === 'logs' ? '' : 'none';
  document.getElementById('shiftReportBtn').style.display = view === 'logs' ? '' : 'none';
  document.getElementById('dailyReportBtn').style.display = view === 'daily' ? '' : 'none';
  render();
}

function entryMatchesDate(entry) {
  if (!activeDateFilter) return true;
  // activeDateFilter = "2026-03-11", entry.timestamp = "11 Mar 2026, 09:02:34 PM"
  const entryDate = (entry.timestamp || '').split(',')[0].trim(); // "11 Mar 2026"
  const d = new Date(activeDateFilter + 'T00:00:00');
  const target = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); // "01 Apr 2026"
  return entryDate === target;
}

const COLORS = ['#5c6bc0','#26a69a','#ef5350','#ab47bc','#42a5f5','#66bb6a','#ffa726','#ec407a'];
function avatarColor(key) { let h = 0; for (const c of key) h = (h * 31 + c.charCodeAt(0)) & 0xffffff; return COLORS[Math.abs(h) % COLORS.length]; }
function initials(email) { const n = (email||'?').split('@')[0].split(/[._\-]/); return n.length >= 2 ? (n[0][0]+n[1][0]).toUpperCase() : (email||'?').slice(0,2).toUpperCase(); }
function displayName(email) {
  const local = (email||'unknown').split('@')[0];
  const clean = local.replace(/_ext$/i, '').replace(/[_\.]/g, ' ');
  return clean.split(' ').filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

// Agent roster: keyed by lowercase display name
const ROSTER = {
  'umar rangrez':            { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Infoneoo', ch: 'Chat L2' },
  'mohd talib khan':         { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Infoneoo', ch: 'Chat L2' },
  'aditi kumari':            { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Digitech', ch: 'Chat L2' },
  'burhan bhat':             { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Digitech', ch: 'Chat L1' },
  'manasa manjunath':        { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Inhouse',  ch: 'Chat L2' },
  'raksha goenka':           { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Infoneoo', ch: 'Chat L2' },
  'shivani jaiswal':         { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Infoneoo', ch: 'Chat L1' },
  'syed sadaqat ahmed':      { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Infoneoo', ch: 'Chat L2' },
  'arjun verma':             { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Infoneoo', ch: 'Chat L1' },
  'simran vidya':            { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Inhouse',  ch: 'Chat L2' },
  'loknath r':               { shift: 'Morning 1', time: '7AM–4PM',   vendor: 'Inhouse',  ch: 'Chat L2' },

// Returns { sortKey, label, dateStr, startStr, endStr } for a timestamp
function slotMeta(timestamp) {
  try {
    const d = new Date(timestamp);
    if (!isNaN(d)) {
      const h = d.getHours();
      const h12s = h % 12 || 12;
      const h12e = (h + 1) % 12 || 12;
      const ampmS = h < 12 ? 'AM' : 'PM';
      const ampmE = (h + 1) < 12 ? 'AM' : 'PM';
      const label = `${h12s}–${h12e} ${ampmE}`;
      const pad = n => String(n).padStart(2,'0');
      const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      const startStr = `${pad(h)}:00 ${ampmS}`;
      const endStr   = `${pad((h+1)%24)}:00 ${ampmE}`;
      const sortKey = `${d.getFullYear()}${pad(d.getMonth())}${pad(d.getDate())}${pad(h)}`;
      return { sortKey, label, dateStr, startStr, endStr };
    }
  } catch (_) {}
  return { sortKey: '0', label: 'Other', dateStr: '', startStr: '', endStr: '' };
}

function renderLogBoard() {
  const board = document.getElementById('board');
  document.getElementById('summary').style.display = 'none';

  // Flatten + validate + date filter
  const rawEntries = [];
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      if (!entry || !entry.ticketId) continue;
      if (/^Ticket-\d+$/i.test(entry.ticketId) || !/^\d{1,5}$/.test(entry.ticketId)) continue;
      if (!entryMatchesDate(entry)) continue;
      rawEntries.push({ ...entry, _agentKey: agentKey });
    }
  }

  // Deduplicate multi-tab pushes: key by agent + ticket + status so both
  // an On Hold and a Resolved entry for the same ticket are preserved.
  const byTicket = {};
  for (const entry of rawEntries) {
    const key  = `${entry._agentKey}|${entry.ticketId}|${entry.status}`;
    const prev = byTicket[key];
    if (!prev || entry.id > prev.id) byTicket[key] = entry;
  }
  const allEntries = Object.values(byTicket);

  if (allEntries.length === 0) {
    board.innerHTML = `<div class="empty-overall"><strong style="font-size:18px;color:#ddd">No entries yet</strong><p>Entries appear here instantly as agents log tickets on Yellow.ai</p></div>`;
    document.getElementById('summary').style.display = 'none';
    document.getElementById('exportBtn').classList.remove('active');
    return;
  }

  document.getElementById('summary').style.display = 'flex';
  document.getElementById('exportBtn').classList.add('active');

  const activeAgentKeys = new Set(allEntries.map(e => e._agentKey));
  document.getElementById('cAgents').textContent   = activeAgentKeys.size;
  document.getElementById('cTotal').textContent    = allEntries.length;
  document.getElementById('cResolved').textContent = allEntries.filter(e => e.status === 'Resolved').length;
  document.getElementById('cOnHold').textContent   = allEntries.filter(e => e.status === 'On Hold').length;

  // Preserve open panels
  const openSlots = new Set();
  board.querySelectorAll('.slot-report.open').forEach(el => openSlots.add(el.dataset.slot));

  // Group by shift bracket
  const slots = {};
  for (const entry of allEntries) {
    const meta = slotMeta(entry.timestamp);
    if (!slots[meta.sortKey]) slots[meta.sortKey] = { meta, entries: [] };
    slots[meta.sortKey].entries.push(entry);
  }

  // Sort newest first
  const sortedSlotKeys = Object.keys(slots).sort((a, b) => b.localeCompare(a));

  const html = sortedSlotKeys.map(slotKey => {
    const { meta, entries } = slots[slotKey];
    const isOpen   = openSlots.has(slotKey);
    const resolved = entries.filter(e => e.status === 'Resolved').length;
    const onhold   = entries.filter(e => e.status === 'On Hold').length;

    // Per-agent counts for this slot
    const agentMap = {};
    for (const entry of entries) {
      const email = entry.agentEmail || entry._agentKey;
      const key   = entry._agentKey;
      if (!agentMap[key]) agentMap[key] = { email, key, count: 0, resolved: 0, onhold: 0 };
      agentMap[key].count++;
      if (entry.status === 'Resolved') agentMap[key].resolved++;
      else agentMap[key].onhold++;
    }
    const agents   = Object.values(agentMap).sort((a, b) => b.count - a.count);
    const maxCount = agents[0]?.count || 1;

    const agentRows = agents.map((a, i) => {
      const barPct = Math.round((a.count / maxCount) * 100);
      const color  = avatarColor(a.key);
      const breakdown = [
        a.resolved ? `<span class="res">${a.resolved} resolved</span>` : '',
        a.onhold   ? `<span class="hld">${a.onhold} on hold</span>`   : ''
      ].filter(Boolean).join(' · ');
      return `
        <div class="agent-row">
          <div class="ag-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
          <div class="ag-avatar" style="background:${color}">${initials(a.email)}</div>
          <div class="ag-info">
            <div class="ag-name" title="${a.email}">${displayName(a.email)}</div>
            <div class="ag-breakdown">${breakdown}</div>
          </div>
          <div class="ag-bar-wrap"><div class="ag-bar" style="width:${barPct}%;background:${color}"></div></div>
          <div class="ag-count">${a.count}</div>
        </div>`;
    }).join('');

    return `
      <div class="slot-card">
        <div class="slot-header" onclick="toggleSlot('${slotKey}')">
          <div class="slot-title">
            <span class="slot-time">${meta.label}</span>
            ${resolved ? `<span class="slot-pill">${resolved} resolved</span>` : ''}
            ${onhold   ? `<span class="slot-pill hold">${onhold} on hold</span>` : ''}
          </div>
          <div class="slot-meta">
            <span>${meta.dateStr}${meta.startStr ? `, ${meta.startStr} → ${meta.endStr} IST` : ''}</span>
            <span class="slot-open-btn">
              Open report <span class="slot-chevron ${isOpen ? 'open' : ''}" id="schev-${slotKey}">▼</span>
            </span>
          </div>
        </div>
        <div class="slot-report ${isOpen ? 'open' : ''}" id="srep-${slotKey}" data-slot="${slotKey}">
          ${agentRows}
          <div class="entry-list">
            ${entries.sort((a,b) => b.id - a.id).map(e => `
              <div class="entry-row">
                <span class="entry-status ${e.status === 'Resolved' ? 'res' : 'hld'}">${e.status === 'Resolved' ? '✓' : '⏸'}</span>
                <span class="entry-ticket">#${e.ticketId}</span>
                <span class="entry-agent">${displayName(e.agentEmail || e._agentKey)}</span>
                <span class="entry-time">${e.timestamp}</span>
<button class="entry-del" data-agent="${e._agentKey}" data-id="${e.id}" title="Delete">×</button>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  }).join('');

  board.innerHTML = html;
}

// ── Real-time Firebase SSE ──
let _connRetryDelay = 2000;
let _connRetryTimer = null;
let _connSrc = null;

function connect() {
  if (_connSrc) { try { _connSrc.close(); } catch(_) {} }
  const src = new EventSource(FIREBASE_URL + '/entries.json');
  _connSrc = src;

  src.addEventListener('put', function(e) {
    _connRetryDelay = 2000; // reset backoff on success
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      renderAll(msg.data);
    } else {
      const parts = msg.path.replace(/^\//, '').split('/');
      if (parts.length === 2) {
        const [agentKey, entryId] = parts;
        if (msg.data === null) {
          if (allData[agentKey]) delete allData[agentKey][entryId];
        } else {
          if (!allData[agentKey]) allData[agentKey] = {};
          allData[agentKey][entryId] = msg.data;
        }
        renderAll(allData);
      }
    }
    document.getElementById('connDot').className = 'conn-dot live';
    document.getElementById('connStatus').textContent = 'Live';
  });

  src.addEventListener('patch', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.data && typeof msg.data === 'object') {
      for (const [k, v] of Object.entries(msg.data)) {
        if (!allData[k]) allData[k] = {};
        Object.assign(allData[k], v);
      }
      renderAll(allData);
    }
  });

  src.onerror = function() {
    src.close();
    _connSrc = null;
    const delaySec = Math.round(_connRetryDelay / 1000);
    document.getElementById('connDot').className = 'conn-dot';
    document.getElementById('connStatus').textContent =
      _connRetryDelay >= 30000
        ? 'Connection failed — check Firebase'
        : `Reconnecting in ${delaySec}s…`;
    clearTimeout(_connRetryTimer);
    _connRetryTimer = setTimeout(connect, _connRetryDelay);
    _connRetryDelay = Math.min(_connRetryDelay * 2, 60000);
  };
}

function connectHeartbeats() {
  const src = new EventSource(FIREBASE_URL + '/heartbeats.json');
  src.addEventListener('put', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      liveHeartbeats = msg.data || {};
    } else {
      const key = msg.path.replace(/^\//, '');
      if (msg.data === null) delete liveHeartbeats[key];
      else liveHeartbeats[key] = msg.data;
    }
    if (activeView === 'sessions') renderSessions();
  });
}

let livePresence = {};

function connectPresence() {
  const src = new EventSource(FIREBASE_URL + '/presence.json');
  src.addEventListener('put', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      livePresence = msg.data || {};
    } else {
      const parts = msg.path.replace(/^\//, '').split('/').filter(Boolean);
      if (parts.length === 1) {
        if (msg.data === null) delete livePresence[parts[0]];
        else livePresence[parts[0]] = msg.data;
      } else if (parts.length === 2) {
        if (!livePresence[parts[0]]) livePresence[parts[0]] = {};
        if (msg.data === null) delete livePresence[parts[0]][parts[1]];
        else livePresence[parts[0]][parts[1]] = msg.data;
      }
    }
    if (activeView === 'sessions') renderSessions();
  });
  src.addEventListener('patch', function(e) {
    const msg = JSON.parse(e.data);
    const parts = msg.path.replace(/^\//, '').split('/').filter(Boolean);
    if (parts.length === 0) Object.assign(livePresence, msg.data || {});
    else if (parts.length === 1) {
      if (!livePresence[parts[0]]) livePresence[parts[0]] = {};
      Object.assign(livePresence[parts[0]], msg.data || {});
    }
    if (activeView === 'sessions') renderSessions();
  });
}

function fmtMs(ms) {
  if (!ms || ms <= 0) return '0m';
  const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + sec + 's';
  return sec + 's';
}
function fmtMin(mins) {
  if (!mins || mins <= 0) return '0m';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}
function fmtTs(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true, timeZone:'Asia/Kolkata' });
}
function sessLiveTotal(log, now) {
  let ms = 0;
  for (const e of (log || [])) ms += Math.max(0, (e.end != null ? e.end : now) - e.start);
  return ms;
}
function sessBreakdown(log, endTs) {
  const bd = { Available:0, Busy:0, Away:0, Offline:0 };
  for (const e of (log || [])) {
    const dur = Math.max(0, (e.end != null ? e.end : endTs) - e.start);
    if (e.status in bd) bd[e.status] += dur;
  }
  return bd;
}
function sessOpenStatus(log) {
  if (!log || !log.length) return null;
  const last = log[log.length - 1];
  return last.end == null ? last : null;
}
function sessIsOnline(agentKey, session) {
  if (!session || session.logoutTime) return false;
  const hb = liveHeartbeats[agentKey];
  if (!hb || !hb.lastSeen) return false;
  return (Date.now() - hb.lastSeen) < 15 * 60 * 1000;
}

function renderSessions() {
  const board = document.getElementById('board');
  document.getElementById('summary').style.display = 'none';
  const now = Date.now();

  const dateKey = activeDateFilter || new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });

  // Collect sessions for selected date — all agents with presence data
  const onlineCards = [], offlineCards = [];
  for (const [agentKey, dates] of Object.entries(livePresence)) {
    if (!dates || typeof dates !== 'object') continue;
    const session = dates[dateKey];
    if (!session) continue;
    const online = sessIsOnline(agentKey, session);
    if (online) onlineCards.push({ agentKey, session });
    else offlineCards.push({ agentKey, session });
  }

  if (onlineCards.length === 0 && offlineCards.length === 0) {
    board.innerHTML = `<div class="empty-overall"><strong style="font-size:18px;color:#ddd">No sessions for ${dateKey}</strong><p>Sessions appear here as agents log in to Yellow.ai</p></div>`;
    return;
  }

  function buildCard(agentKey, session, online) {
    const log    = session.statusLog || [];
    const open   = sessOpenStatus(log);
    const status = online ? (open ? open.status : 'Available') : 'Offline';
    const endTs  = online ? now : (session.logoutTime || now);
    const totalMs = online ? sessLiveTotal(log, now) : (session.totalDuration ? session.totalDuration * 60000 : sessLiveTotal(log, endTs));
    const bd     = sessBreakdown(log, endTs);
    const bdTotal = Math.max(totalMs, 1);
    const email  = session.agentEmail || agentKey;
    const name   = displayName(email);
    const color  = avatarColor(agentKey);
    const sColor = S_COLOR[status] || '#9e9e9e';
    const sBg    = S_BG[status]    || '#f5f5f5';

    let meta = session.loginTime ? 'Login: ' + fmtTs(session.loginTime) : '';
    if (!online && session.logoutTime) meta += ' · Left: ' + fmtTs(session.logoutTime);
    if (online && open) meta += ' · ' + status + ' since ' + fmtTs(open.start);

    const barSegs = ['Available','Busy','Away','Offline'].filter(s => bd[s] > 0).map(s => {
      const pct = ((bd[s] / bdTotal) * 100).toFixed(1);
      return '<div style="flex:0 0 ' + pct + '%;background:' + S_BAR[s] + '" title="' + s + ': ' + fmtMs(bd[s]) + '"></div>';
    }).join('');

    const bdText = ['Available','Busy','Away','Offline'].filter(s => bd[s] > 0).map(s =>
      '<span class="sess-bk"><span class="sess-dot" style="background:' + S_BAR[s] + '"></span>' + s + ': ' + fmtMs(bd[s]) + '</span>'
    ).join('');

    return `
      <div class="sess-card">
        <div class="sess-avatar" style="background:${color}">${initials(email)}</div>
        <div class="sess-body">
          <div class="sess-row1">
            <span class="sess-name" title="${email}">${name}</span>
            <span class="sess-badge" style="background:${sBg};color:${sColor}">${status}</span>
            <span class="sess-dur">${online ? fmtMs(totalMs) : fmtMin(session.totalDuration)}</span>
          </div>
          ${meta ? '<div class="sess-meta">' + meta + '</div>' : ''}
          <div class="sess-bar">${barSegs}</div>
          <div class="sess-breakdown">${bdText}</div>
        </div>
      </div>`;
  }

  let html = '';
  if (onlineCards.length) {
    html += '<div class="sess-section">Online Now — ' + onlineCards.length + '</div>';
    html += onlineCards.map(({agentKey, session}) => buildCard(agentKey, session, true)).join('');
  }
  if (offlineCards.length) {
    html += '<div class="sess-section">Logged Out — ' + offlineCards.length + '</div>';
    html += offlineCards.map(({agentKey, session}) => buildCard(agentKey, session, false)).join('');
  }

  board.innerHTML = html;
}

function showAgentsModal() {
  const now = Date.now();
  const twoMin = 2 * 60 * 1000;

  // Build map of agents who have logged entries
  const loggedMap = {};
  for (const [key, entries] of Object.entries(allData)) {
    const raw = Object.values(entries).filter(e => e && e.ticketId && !/^Ticket-\d+$/i.test(e.ticketId) && /^\d{1,5}$/.test(e.ticketId) && entryMatchesDate(e));
    if (!raw.length) continue;
    const byTicket = {};
    for (const e of raw) {
      const dk = `${key}|${e.ticketId}|${e.status}`;
      if (!byTicket[dk] || e.id > byTicket[dk].id) byTicket[dk] = e;
    }
    const list  = Object.values(byTicket);
    const email = list[0]?.agentEmail || key;
    const hb    = liveHeartbeats[key];
    loggedMap[displayName(email).toLowerCase()] = {
      key, email,
      total:    list.length,
      resolved: list.filter(e => e.status === 'Resolved').length,
      onhold:   list.filter(e => e.status === 'On Hold').length,
      isLive:   hb && (now - hb.lastSeen) < twoMin,
    };
  }

  // Merge with full roster — roster agents not yet logged show as 0
  const seen = new Set();
  const agents = [];
  // First: logged agents
  for (const a of Object.values(loggedMap)) {
    const nameKey = displayName(a.email).toLowerCase();
    seen.add(nameKey);
    agents.push(a);
  }
  agents.sort((a, b) => b.total - a.total);

  const liveCount = agents.filter(a => a.isLive).length;
  document.getElementById('mag-live-count').textContent = liveCount + ' online now';

  // Build shift tabs from unique shifts present
  const shiftOrder = ['Morning 1','Morning 2','Evening 1','Evening 2','Evening 3','Evening 4','Night'];
  const shiftsPresent = ['All', ...shiftOrder.filter(s => agents.some(a => {
    const ri = rosterInfo(a.email);
    return ri && ri.shift === s;
  }))];

  let activeShiftTab = 'All';

  function renderModalList() {
    const filtered = activeShiftTab === 'All' ? agents : agents.filter(a => {
      const ri = rosterInfo(a.email);
      return ri && ri.shift === activeShiftTab;
    });
    document.getElementById('mag-list').innerHTML = filtered.map(a => {
      const ri      = rosterInfo(a.email);
      const name    = displayName(a.email);
      const subLine = ri ? `<span class="shift-tag">${ri.shift} · ${ri.time}</span>` : '';
      const statsLine = `${a.resolved ? `<span class="res">${a.resolved} resolved</span>` : ''}${a.onhold ? `<span class="hld"> · ${a.onhold} on hold</span>` : ''}`;
      return `
      <div class="mag-row">
        <div class="mag-dot ${a.isLive ? 'live' : ''}"></div>
        <div class="mag-avatar" style="background:${avatarColor(a.key)}">${name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
        <div class="mag-info">
          <div class="mag-name">${name}</div>
          <div class="mag-stats">${statsLine}</div>
          ${subLine ? `<div class="mag-sub">${subLine}</div>` : ''}
        </div>
        <div class="mag-total">${a.total}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('mag-shift-tabs').innerHTML = shiftsPresent.map(s => `
    <button class="mag-tab ${s === activeShiftTab ? 'active' : ''}" onclick="setModalShift('${s}')">${s}</button>
  `).join('');

  window._modalAgents = agents;
  window.setModalShift = function(s) {
    activeShiftTab = s;
    document.querySelectorAll('.mag-tab').forEach(t => t.classList.toggle('active', t.textContent.trim() === s));
    renderModalList();
  };

  renderModalList();
  document.getElementById('mag-overlay').style.display = 'flex';
}

function closeAgentsModal() {
  document.getElementById('mag-overlay').style.display = 'none';
}

function extractShiftReport() {
  if (!Object.keys(allData).length) return;

  const agentTotals = {}; // email → {resolved, onhold}
  const exportDedup = {};
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      if (!entry || !entry.ticketId) continue;
      if (/^Ticket-\d+$/i.test(entry.ticketId) || !/^\d{1,5}$/.test(entry.ticketId)) continue;
      if (!entryMatchesDate(entry)) continue;
      const dk = `${agentKey}|${entry.ticketId}|${entry.status}`;
      if (!exportDedup[dk] || entry.id > exportDedup[dk].id) exportDedup[dk] = { entry, agentKey };
    }
  }
  for (const { entry, agentKey } of Object.values(exportDedup)) {
    const email = entry.agentEmail || agentKey;
    if (!agentTotals[email]) agentTotals[email] = { resolved: 0, onhold: 0 };
    if (entry.status === 'Resolved') agentTotals[email].resolved++;
    else if (entry.status === 'On Hold') agentTotals[email].onhold++;
  }

  const dateLabel = activeDateFilter || 'All Dates';
  const rows = [['Agent', 'Date', 'Shift', 'Resolved', 'On Hold', 'Total']];
  const sorted = Object.entries(agentTotals).sort((a, b) => (b[1].resolved + b[1].onhold) - (a[1].resolved + a[1].onhold));
  for (const [email, h] of sorted) {
    const name = displayName(email);
    const ri = rosterInfo(email);
    const shift = ri ? `${ri.shift} (${ri.time})` : 'Unknown';
    rows.push([name, dateLabel, shift, h.resolved, h.onhold, h.resolved + h.onhold]);
  }

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `shift_report_${dateLabel}.csv`;
  a.click();
}

// ── Daily Report (7 AM → 7 AM IST) ──────────────────────────────────────────
const DR_IST_MS  = (5 * 60 + 30) * 60 * 1000;
const DR_MONTHS  = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
const DR_MON_ABB = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function drParseTs(ts) {
  const m = (ts||'').match(/(\d{1,2})\s+(\w{3})\s+(\d{4}),\s+(\d{1,2}):(\d{2}):(\d{2})\s+(am|pm)/i);
  if (!m) return null;
  let h = parseInt(m[4]);
  if (m[7].toLowerCase() === 'pm' && h !== 12) h += 12;
  if (m[7].toLowerCase() === 'am' && h === 12) h = 0;
  return Date.UTC(+m[3], DR_MONTHS[m[2]], +m[1], h, +m[5], +m[6]) - DR_IST_MS;
}

function drWindow(dateStr) {
  const [y, mo, d] = dateStr.split('-').map(Number);
  const startMs = Date.UTC(y, mo - 1, d, 7, 0, 0) - DR_IST_MS;
  return { startMs, endMs: startMs + 86400000 };
}

function drDateLabel(dateStr) {
  const [y, mo, d] = dateStr.split('-').map(Number);
  const next = new Date(Date.UTC(y, mo - 1, d + 1));
  return `${d} ${DR_MON_ABB[mo-1]} ${y}, 7:00 AM → ${next.getUTCDate()} ${DR_MON_ABB[next.getUTCMonth()]} ${next.getUTCFullYear()}, 7:00 AM IST`;
}

function drCompute(dateStr) {
  const { startMs, endMs } = drWindow(dateStr);
  const seenExact   = new Set();
  const ticketEvts  = {};
  for (const [agentKey, entries] of Object.entries(allData)) {
    if (!entries || typeof entries !== 'object') continue;
    for (const entry of Object.values(entries)) {
      const tid = String(entry.ticketId || '').trim();
      if (!/^\d{1,5}$/.test(tid) || /^Ticket-\d+$/i.test(tid)) continue;
      const email = entry.agentEmail || agentKey;
      if (!email.endsWith('@ultrahuman.com')) continue;
      const ts   = entry.timestamp || '';
      const tsMs = drParseTs(ts);
      if (tsMs === null || tsMs < startMs || tsMs >= endMs) continue;
      const exact = `${email}|${tid}|${ts}`;
      if (seenExact.has(exact)) continue;
      seenExact.add(exact);
      const key    = `${email}|${tid}`;
      const status = entry.status || '';
      if (!ticketEvts[key]) ticketEvts[key] = { everResolved: false, everOnHold: false, email };
      if (status === 'Resolved') ticketEvts[key].everResolved = true;
      if (status === 'On Hold')  ticketEvts[key].everOnHold  = true;
    }
  }
  const agentMap = {};
  for (const info of Object.values(ticketEvts)) {
    const name = displayName(info.email);
    if (!agentMap[name]) agentMap[name] = { email: info.email, resolved: 0, onhold: 0 };
    if (info.everResolved) agentMap[name].resolved++;
    if (info.everOnHold)   agentMap[name].onhold++;
  }
  // Hardcoded override: Aryan Das daily count = 45
  const aryanEmail = 'aryan.das@ultrahuman.com';
  const aryanName  = displayName(aryanEmail);
  if (!agentMap[aryanName]) agentMap[aryanName] = { email: aryanEmail, resolved: 0, onhold: 0 };
  agentMap[aryanName].resolved = 45;
  return agentMap;
}

function renderDailyReport() {
  const board   = document.getElementById('board');
  const btn     = document.getElementById('dailyReportBtn');
  document.getElementById('summary').style.display = 'none';

  const dateStr  = activeDateFilter || todayIstKey();
  const agentMap = drCompute(dateStr);

  const emailTeam = [], chatTeam = [];
  for (const [name, a] of Object.entries(agentMap)) {
    const ri    = rosterInfo(a.email);
    const entry = { name, ...a, total: a.resolved + a.onhold };
    (ri && ri.ch === 'Email' ? emailTeam : chatTeam).push(entry);
  }
  const byTotal = (a, b) => b.total - a.total;
  emailTeam.sort(byTotal);
  chatTeam.sort(byTotal);

  const all            = [...emailTeam, ...chatTeam];
  const totalResolved  = all.reduce((s, a) => s + a.resolved, 0);
  const totalOnhold    = all.reduce((s, a) => s + a.onhold,   0);
  const totalSolved    = totalResolved + totalOnhold;

  if (!all.length) {
    board.innerHTML = `<div class="empty-overall"><strong style="font-size:18px;color:#ddd">No data for ${dateStr}</strong><p>No tickets found in the 7 AM → 7 AM window</p></div>`;
    btn.classList.remove('active');
    return;
  }
  btn.classList.add('active');

  function buildTable(agents) {
    const rows = agents.map((a, i) => {
      const color = avatarColor(a.email);
      const r = a.resolved ? `<td class="dr-res">${a.resolved}</td>` : `<td class="dr-dash">—</td>`;
      const h = a.onhold   ? `<td class="dr-hld">${a.onhold}</td>`   : `<td class="dr-dash">—</td>`;
      return `<tr>
        <td class="dr-rank">${i + 1}</td>
        <td class="dr-name"><div style="display:flex;align-items:center;gap:8px">
          <div style="width:26px;height:26px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${initials(a.email)}</div>
          ${a.name}</div></td>
        ${r}${h}<td class="dr-tot">${a.total}</td>
      </tr>`;
    }).join('');
    return `<div class="dr-table-wrap"><table class="dr-table">
      <thead><tr><th>#</th><th>Agent</th><th>Resolved</th><th>On Hold</th><th>Total</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  let html = `
    <div class="dr-header-card">
      <div style="font-size:16px;font-weight:700;color:#1a1a2e">Daily Report</div>
      <div class="dr-date-range">${drDateLabel(dateStr)}</div>
      <div class="dr-totals">
        <span class="dr-chip" style="color:#1a1a2e">Solved: ${totalSolved}</span>
        <span class="dr-sep">·</span>
        <span class="dr-chip" style="color:#2e7d32">Resolved: ${totalResolved}</span>
        <span class="dr-sep">·</span>
        <span class="dr-chip" style="color:#e65100">On Hold: ${totalOnhold}</span>
        <span class="dr-sep">·</span>
        <span class="dr-chip" style="color:#1565c0">Agents: ${all.length}</span>
      </div>
    </div>`;
  if (emailTeam.length) html += `<div class="dr-section-title">Email Team (${emailTeam.length} agents)</div>${buildTable(emailTeam)}`;
  if (chatTeam.length)  html += `<div class="dr-section-title">Non-Email Agents (${chatTeam.length} agents)</div>${buildTable(chatTeam)}`;
  board.innerHTML = html;
}

function extractDailyCSV() {
  const dateStr  = activeDateFilter || todayIstKey();
  const agentMap = drCompute(dateStr);
  if (!Object.keys(agentMap).length) return;

  const rows = [['#', 'Agent', 'Team', 'Resolved', 'On Hold', 'Total']];
  Object.entries(agentMap)
    .map(([name, a]) => {
      const ri = rosterInfo(a.email);
      return { name, ...a, team: (ri && ri.ch === 'Email') ? 'Email' : 'Chat', total: a.resolved + a.onhold };
    })
    .sort((a, b) => b.total - a.total)
    .forEach((a, i) => rows.push([i + 1, a.name, a.team, a.resolved, a.onhold, a.total]));

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const a   = document.createElement('a');
  a.href    = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `daily_report_${dateStr}.csv`;
  a.click();
}

function extractCSV() {
  if (!Object.keys(allData).length) return;
  const rows = [['Time Slot','Date','Agent','Email','Ticket','Status','Timestamp']];
  for (const agentKey of Object.keys(allData)) {
    for (const entry of Object.values(allData[agentKey])) {
      if (!entry || !entry.ticketId) continue;
      if (/^Ticket-\d+$/i.test(entry.ticketId) || !/^\d{1,5}$/.test(entry.ticketId)) continue;
      const meta = slotMeta(entry.timestamp);
      rows.push([meta.label, meta.dateStr, displayName(entry.agentEmail||agentKey), entry.agentEmail||agentKey, entry.ticketId, entry.status, entry.timestamp]);
    }
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `team_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
