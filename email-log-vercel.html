<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Log Sheet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f9fa; min-height: 100vh; padding: 32px 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }

  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .header p  { font-size: 13px; color: #888; margin-top: 4px; }

  .controls {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .controls select, .controls input[type="date"] {
    padding: 8px 12px; border-radius: 8px; border: 1.5px solid #ddd;
    font-size: 14px; color: #333; background: #fff; cursor: pointer;
  }
  .controls select:focus, .controls input[type="date"]:focus {
    outline: none; border-color: #4a90d9;
  }
  .btn-extract {
    padding: 9px 18px; border-radius: 8px; border: none;
    background: #ccc; color: #fff; font-size: 14px; font-weight: 600;
    cursor: not-allowed; display: flex; align-items: center; gap: 6px;
  }
  .btn-extract.active { background: #2e7d32; cursor: pointer; }
  .btn-extract.active:hover { background: #1b5e20; }

  .summary-bar {
    background: #fff; border-radius: 10px; padding: 12px 18px;
    font-size: 14px; color: #555; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; gap: 24px; flex-wrap: wrap;
  }
  .summary-bar b { color: #1a1a2e; }
  .s-resolved { color: #2e7d32; font-weight: 700; }
  .s-onhold   { color: #e65100; font-weight: 700; }

  .table-wrap {
    background: #fff; border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .table-header {
    display: grid; grid-template-columns: 46px 1.6fr 88px 1.8fr 100px;
    padding: 11px 18px; background: #f1f3f5; font-weight: 700;
    font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .empty-state { padding: 40px 18px; text-align: center; color: #aaa; font-size: 14px; }
  .table-row {
    display: grid; grid-template-columns: 46px 1.6fr 88px 1.8fr 100px;
    padding: 11px 18px; align-items: center; border-top: 1px solid #f0f0f0;
    font-size: 14px; transition: background 0.1s;
  }
  .table-row:hover { background: #fafbfc; }
  .row-num    { color: #bbb; font-weight: 600; font-size: 13px; }
  .row-agent  { font-weight: 600; color: #1a1a2e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-ticket { font-family: monospace; font-size: 13px; color: #444; font-weight: 600; }
  .row-time   { color: #888; font-size: 12px; }
  .status-badge {
    padding: 4px 10px; border-radius: 14px; font-size: 12px; font-weight: 600;
    display: inline-block; white-space: nowrap;
  }
  .status-resolved { background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; }
  .status-onhold   { background: #fff3e0; color: #e65100; border: 1.5px solid #ffcc80; }

  .table-footer {
    padding: 10px 18px; background: #f9fafb; border-top: 1px solid #f0f0f0;
    font-size: 13px; color: #888; display: flex; justify-content: space-between;
  }
  .table-footer b { color: #333; }
  .count-resolved { color: #2e7d32; }
  .count-onhold   { color: #e65100; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Email Log Sheet</h1>
      <p id="lastRefresh">Connecting to Firebase...</p>
    </div>
  </div>

  <div class="controls">
    <input type="date" id="datePicker" />
    <select id="slotPicker"></select>
    <button class="btn-extract" id="extractBtn" onclick="extractCSV()">
      <span style="font-size:15px">⬇</span> Extract CSV
    </button>
  </div>

  <div class="summary-bar" id="summaryBar"><span>Loading...</span></div>

  <div class="table-wrap">
    <div class="table-header">
      <span>#</span><span>Agent</span><span>Ticket ID</span><span>Timestamp</span><span>Status</span>
    </div>
    <div id="tableBody"><div class="empty-state">Fetching entries...</div></div>
    <div id="tableFooter" style="display:none" class="table-footer">
      <span>Total: <b id="totalCount">0</b></span>
      <span>Resolved: <b class="count-resolved" id="resolvedCount">0</b> &nbsp;·&nbsp; On Hold: <b class="count-onhold" id="onholdCount">0</b></span>
    </div>
  </div>
</div>

<script>
  const FIREBASE_URL  = 'https://yl-logs-default-rtdb.firebaseio.com';
  const IST_OFFSET_MS = (5 * 60 + 30) * 60 * 1000;
  const MONTHS_MAP    = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
  const MONTHS_PAD    = { Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12' };

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function istToday() {
    return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
  }

  function istCurrentHour() {
    return new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata', hour: 'numeric', hour12: false }) | 0;
  }

  function nameFromEmail(email) {
    const local = (email || '').split('@')[0].replace(/_ext$/, '');
    return local.split(/[._]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // Parse "16 Apr 2026, 03:00:13 pm" → UTC milliseconds
  function parseTimestampMs(ts) {
    const m = (ts || '').match(/(\d{1,2})\s+(\w{3})\s+(\d{4}),\s+(\d{1,2}):(\d{2}):(\d{2})\s+(am|pm)/i);
    if (!m) return null;
    let h = parseInt(m[4]);
    const ampm = m[7].toLowerCase();
    if (ampm === 'pm' && h !== 12) h += 12;
    if (ampm === 'am' && h === 12) h = 0;
    return Date.UTC(+m[3], MONTHS_MAP[m[2]], +m[1], h, +m[5], +m[6]) - IST_OFFSET_MS;
  }

  // YYYY-MM-DD in IST from UTC ms
  function dateKeyFromMs(ms) {
    const d = new Date(ms + IST_OFFSET_MS);
    return d.toISOString().slice(0, 10);
  }

  // Slot label matching hourly_report.py output
  function slotLabel(h) {
    const fmt  = x => (x === 0 || x === 12) ? '12' : String(x % 12);
    const ampm = x => x < 12 ? 'AM' : 'PM';
    const end  = (h + 1) % 24;
    return ampm(h) !== ampm(end)
      ? `${fmt(h)} ${ampm(h)}–${fmt(end)} ${ampm(end)}`
      : `${fmt(h)}–${fmt(end)} ${ampm(end)}`;
  }

  // Start/end UTC ms for a date+hour in IST
  function slotBoundsMs(dateStr, hour) {
    const [y, mo, d] = dateStr.split('-').map(Number);
    const startMs = Date.UTC(y, mo - 1, d, hour, 0, 0) - IST_OFFSET_MS;
    return { startMs, endMs: startMs + 3600000 };
  }

  // ── Slot picker setup ────────────────────────────────────────────────────────

  function buildSlotPicker() {
    const sel = document.getElementById('slotPicker');
    sel.innerHTML = '<option value="all">All day</option>';
    for (let h = 0; h < 24; h++) {
      const opt = document.createElement('option');
      opt.value = h;
      opt.textContent = slotLabel(h);
      sel.appendChild(opt);
    }
    // Default to previous completed hour (what was last posted to Slack)
    const curHour = istCurrentHour();
    sel.value = curHour > 0 ? curHour - 1 : 'all';
  }

  // ── Raw event store ──────────────────────────────────────────────────────────

  let rawEvents = []; // all valid events from Firebase

  function parseRawEvents(data) {
    if (!data || typeof data !== 'object') return [];
    const seenExact = new Set();
    const events = [];
    for (const agentData of Object.values(data)) {
      if (!agentData || typeof agentData !== 'object') continue;
      for (const entry of Object.values(agentData)) {
        const tid = String(entry.ticketId || '').trim();
        if (!/^\d{1,5}$/.test(tid)) continue;
        if (/^Ticket-\d+$/i.test(tid)) continue;
        const email = entry.agentEmail || '';
        if (!email.endsWith('@ultrahuman.com')) continue;
        const exactKey = `${email}|${tid}|${entry.timestamp}`;
        if (seenExact.has(exactKey)) continue;
        seenExact.add(exactKey);
        const tsMs = parseTimestampMs(entry.timestamp);
        if (tsMs === null) continue;
        events.push({
          ticketId:  tid,
          timestamp: entry.timestamp || '',
          tsMs,
          status:    entry.status || '',
          email,
          agentName: nameFromEmail(email),
          sortKey:   entry.id || 0,
        });
      }
    }
    return events;
  }

  // ── Compute tickets for selected date + slot (mirrors hourly_report.py) ──────

  function computeTickets(dateStr, slotHour) {
    const isAllDay = slotHour === 'all';
    const bounds   = isAllDay ? null : slotBoundsMs(dateStr, parseInt(slotHour));

    // Filter events to selected date + slot
    const inSlot = rawEvents.filter(e => {
      if (dateKeyFromMs(e.tsMs) !== dateStr) return false;
      if (!bounds) return true;
      return e.tsMs >= bounds.startMs && e.tsMs < bounds.endMs;
    });

    // Group by (email|tid): track ever-resolved, ever-on-hold, latest event for display
    const tickets = {};
    for (const e of inSlot) {
      const key = `${e.email}|${e.ticketId}`;
      if (!tickets[key]) {
        tickets[key] = {
          ticketId:     e.ticketId,
          agentName:    e.agentName,
          everResolved: false,
          everOnHold:   false,
          latestTs:     '',
          latestStatus: '',
          latestSortKey: 0,
        };
      }
      if (e.status === 'Resolved') tickets[key].everResolved = true;
      if (e.status === 'On Hold')  tickets[key].everOnHold   = true;
      if (e.sortKey > tickets[key].latestSortKey) {
        tickets[key].latestTs      = e.timestamp;
        tickets[key].latestStatus  = e.status;
        tickets[key].latestSortKey = e.sortKey;
      }
    }
    return Object.values(tickets);
  }

  // ── Render ───────────────────────────────────────────────────────────────────

  function render() {
    const dateStr  = document.getElementById('datePicker').value;
    const slotHour = document.getElementById('slotPicker').value;
    const tickets  = computeTickets(dateStr, slotHour);

    const body    = document.getElementById('tableBody');
    const footer  = document.getElementById('tableFooter');
    const summary = document.getElementById('summaryBar');
    const btn     = document.getElementById('extractBtn');

    const resolved = tickets.filter(t => t.everResolved).length;
    const onhold   = tickets.filter(t => t.everOnHold).length;
    const total    = resolved + onhold;

    const slotStr = slotHour === 'all' ? 'All day' : slotLabel(parseInt(slotHour));
    summary.innerHTML =
      `<span><b>${slotStr}</b></span>` +
      `<span>Total: <b>${total}</b></span>` +
      `<span>Resolved: <span class="s-resolved">${resolved}</span></span>` +
      `<span>On Hold: <span class="s-onhold">${onhold}</span></span>`;

    if (tickets.length === 0) {
      body.innerHTML = '<div class="empty-state">No entries for this slot.</div>';
      footer.style.display = 'none';
      btn.classList.remove('active');
      return;
    }

    btn.classList.add('active');
    tickets.sort((a, b) => a.latestSortKey - b.latestSortKey);

    let html = '';
    tickets.forEach((t, i) => {
      const cls = t.latestStatus === 'Resolved' ? 'status-resolved' : 'status-onhold';
      html += `
        <div class="table-row">
          <span class="row-num">${i + 1}</span>
          <span class="row-agent">${t.agentName}</span>
          <span class="row-ticket">${t.ticketId}</span>
          <span class="row-time">${t.latestTs}</span>
          <span><span class="status-badge ${cls}">${t.latestStatus}</span></span>
        </div>`;
    });
    body.innerHTML = html;

    footer.style.display = 'flex';
    document.getElementById('totalCount').textContent    = total;
    document.getElementById('resolvedCount').textContent = resolved;
    document.getElementById('onholdCount').textContent   = onhold;
  }

  // ── CSV export ───────────────────────────────────────────────────────────────

  function extractCSV() {
    const dateStr  = document.getElementById('datePicker').value;
    const slotHour = document.getElementById('slotPicker').value;
    const tickets  = computeTickets(dateStr, slotHour);
    if (!tickets.length) return;

    tickets.sort((a, b) => a.latestSortKey - b.latestSortKey);
    const header = 'Sr No,Agent,Ticket ID,Timestamp,Status';
    const rows = tickets.map((t, i) =>
      `${i+1},"${t.agentName}","${t.ticketId}","${t.latestTs}","${t.latestStatus}"`
    );
    const csv  = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `email_log_${dateStr}_${slotHour}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  // ── Real-time Firebase sync ──────────────────────────────────────────────────

  let sseSource = null;

  function applyData(data) {
    rawEvents = parseRawEvents(data);
    render();
    const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('lastRefresh').textContent = `Live from Firebase · updated ${now}`;
  }

  function startRealtimeSync() {
    if (sseSource) sseSource.close();
    sseSource = new EventSource(`${FIREBASE_URL}/entries.json`);

    sseSource.addEventListener('put', (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.path === '/') {
          applyData(msg.data);
        } else {
          fetchAndRender();
        }
      } catch (err) { console.error('[SSE put]', err); }
    });

    sseSource.addEventListener('patch', () => { fetchAndRender(); });

    sseSource.onerror = () => {
      sseSource.close();
      setTimeout(startRealtimeSync, 5000);
    };
  }

  async function fetchAndRender() {
    try {
      const res  = await fetch(`${FIREBASE_URL}/entries.json`);
      const data = await res.json();
      applyData(data);
    } catch (err) {
      document.getElementById('lastRefresh').textContent = 'Failed to load — retrying...';
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────────

  buildSlotPicker();

  const datePicker = document.getElementById('datePicker');
  const slotPicker = document.getElementById('slotPicker');
  datePicker.value = istToday();
  datePicker.addEventListener('change', render);
  slotPicker.addEventListener('change', render);

  startRealtimeSync();
</script>
</body>
</html>
